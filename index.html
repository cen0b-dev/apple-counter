                  <div className="stat-grid">
                    <div className="stat-pill neutral"><div className="stat-pill-label">Counted</div><div className="stat-pill-value">${e.totalCash.toFixed(2)}</div></div>
                    <div className="stat-pill green"><div className="stat-pill-label">Dropped</div><div className="stat-pill-value">${e.dropped.toFixed(2)}</div></div>
                    <div className="stat-pill dark"><div className="stat-pill-label">Remains</div><div className="stat-pill-value">${e.remaining.toFixed(2)}</div></div>
                  </div>
                  {e.dropDetails?.length>0&&<div className="history-chips">{e.dropDetails.map(d=><span key={d.label} className="history-chip">{d.count}× {d.label}</span>)}</div>}
                </div>
              ))}
            </div>
          </>
        )}
      </AnimatedSheet>
      {showCC&&<ConfirmModal title="Clear History?" body="This will permanently delete all your saved drop history. This can't be undone." confirmLabel="Clear All History" onConfirm={clearHistory} onCancel={()=>setShowCC(false)}/>}
    </>
  );
}

function SettingsPanel({onClose,settings,onChange,onReplayTutorial,onShowAbout,onShowChangelog}){
  return(
    <AnimatedSheet onClose={onClose}>
      {(close)=>(
        <>
          <div className="sheet-handle"><div className="sheet-handle-bar"/></div>
          <div className="sheet-hd">
            <span className="sheet-title">Settings</span>
            <button className="icon-btn" onClick={()=>{haptic([6]);close();}}><Icon path={PATH.closeX} size={18}/></button>
          </div>
          <div style={{paddingBottom:'env(safe-area-inset-bottom, 20px)'}}>
            <div className="settings-row">
              <div><div className="settings-label">Gamification</div><div className="settings-sub">High-score flag, record alerts & confetti</div></div>
              <Toggle on={settings.gamification} onChange={()=>{haptic([5]);onChange('gamification',!settings.gamification);}}/>
            </div>
            <div className="settings-row">
              <div><div className="settings-label">Tutorial</div><div className="settings-sub">Replay the onboarding walkthrough</div></div>
              <button className="settings-action" onClick={()=>{haptic([6]);onReplayTutorial();close();}}>Replay</button>
            </div>
            <div className="settings-row">
              <div><div className="settings-label">Changelog</div><div className="settings-sub">See recent updates & commit history</div></div>
              <button className="settings-action" onClick={()=>{haptic([6]);close();onShowChangelog();}}>View</button>
            </div>
            <div className="settings-row">
              <div><div className="settings-label">About</div><div className="settings-sub">Who made this and why</div></div>
              <button className="settings-action" onClick={()=>{haptic([6]);close();onShowAbout();}}>About</button>
            </div>
          </div>
        </>
      )}
    </AnimatedSheet>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────────
function App(){
  // Skeleton: show briefly then swap to real content
  // Use a short delay + rAF so the skeleton is only shown on first paint
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    const t=setTimeout(()=>requestAnimationFrame(()=>setReady(true)),400);
    return()=>clearTimeout(t);
  },[]);
  const {toast,show:showToast}=useToast();
  const prevOver=useRef(false);

  // Auto-show changelog: only for users who finished the tutorial AND have drop history,
  // only when there's a new commit since last seen, and only if they opted in (showAgain).
  useEffect(()=>{
    const tutorialDone=lsGet(LS_TUTORIAL,false);
    const hasHistory=lsGet(LS_HISTORY,[]).length>0;
    if(!tutorialDone||!hasHistory) return; // not a real active user yet

    const seen=lsGet(LS_CHANGELOG,null); // {sha, showAgain} or null (legacy string handled below)
    const seenSha=seen&&typeof seen==='object'?seen.sha:(typeof seen==='string'?seen:null);
    const showAgain=seen&&typeof seen==='object'?seen.showAgain:true; // default opt-in
    if(!showAgain) return; // user explicitly opted out

    fetch(GH_COMMITS_URL,{headers:{'Accept':'application/vnd.github.v3+json'}})
      .then(r=>r.ok?r.json():null)
      .then(data=>{
        if(!data||!data[0]) return;
        if(data[0].sha!==seenSha) setTimeout(()=>setShowChangelog(true),800);
      })
      .catch(()=>{});
  },[]);

  // keyboard offset
  const [fo,setFo]=useState(0);
  useEffect(()=>{
    const vv=window.visualViewport;if(!vv)return;
    let raf=null;
    const up=()=>{cancelAnimationFrame(raf);raf=requestAnimationFrame(()=>setFo(Math.max(0,window.innerHeight-vv.height-vv.offsetTop)));};
    vv.addEventListener('resize',up);
    vv.addEventListener('scroll',up);
    up();
    return()=>{vv.removeEventListener('resize',up);vv.removeEventListener('scroll',up);cancelAnimationFrame(raf);};
  },[]);

  // Theme is pure DOM state — no React re-render needed on toggle
  const thmTm=useRef(null);
  const [theme,setTheme]=useState(()=>document.documentElement.getAttribute('data-theme')||lsGet(LS_THEME,'dark'));
  const toggleTheme=useCallback(()=>{
    haptic([5]);
    const html=document.documentElement;
    clearTimeout(thmTm.current);
    const next=html.getAttribute('data-theme')==='dark'?'light':'dark';
    applyTheme(next);
    lsSet(LS_THEME,next);
    setTheme(next);
    thmTm.current=setTimeout(()=>html.classList.remove('thm'),250);
  },[]);

  const [settings,setSettings]=useState(()=>lsGet(LS_SETTINGS,{gamification:true}));
  const [recordDrop,setRecordDrop]=useState(()=>lsGet(LS_RECORD,0));
  const [showTutorial,setShowTutorial]=useState(()=>!lsGet(LS_TUTORIAL,false));
  const [targetInput,setTargetInput]=useState('200');
  const [billsMode,setBillsMode]=useState('count');
  const [coinsMode,setCoinsMode]=useState('count');
  const [cash,setCash]=useState(EMPTY_CASH);
  const [page,setPage]=useState(1);
  const [drawerOpen,setDrawerOpen]=useState(true);
  const [showHistory,setShowHistory]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showAbout,setShowAbout]=useState(false);
  const [showChangelog,setShowChangelog]=useState(false);
  const [showResetConfirm,setShowResetConfirm]=useState(false);
  const [showRecord,setShowRecord]=useState(null);
  const [hintDone,setHintDone]=useState(()=>lsGet(LS_HINT,false));
  const dismissHint=useCallback(()=>{setHintDone(true);lsSet(LS_HINT,true);},[]);

  const TARGET=Math.max(0,Number(targetInput)||0);
  const totalBillsCents=BILL_DENOMS.reduce((s,d)=>s+toCents(rowValue(cash[String(d)],d,billsMode)),0);
  const totalCoinsCents=COIN_DENOMS.reduce((s,c)=>s+toCents(rowValue(cash[c.id],c.val,coinsMode)),0);
  const totalCents=totalBillsCents+totalCoinsCents;
  const totalCash=fromCents(totalCents);
  const overageCents=totalCents-toCents(TARGET);
  const dropAmount=fromCents(Math.max(0,overageCents));
  const dropDetails=computeDrop(cash,billsMode,dropAmount,TARGET);
  const actualDropTotal=dropDetails.reduce((s,i)=>s+i.value,0);
  const remainingCents=totalCents-toCents(actualDropTotal);
  const remainingDrawer=fromCents(remainingCents);
  const undroppableCents=overageCents>0?toCents(dropAmount)-toCents(actualDropTotal):0;
  const over=totalCash>=TARGET;
  useEffect(()=>{
    if(totalCash<=0){prevOver.current=over;return;}
    if(!prevOver.current&&over){haptic([8,18,8]);showToast('Target reached','success');}
    prevOver.current=over;
  },[over,totalCash,showToast]);

  const changeSetting=(k,v)=>setSettings(prev=>{const n={...prev,[k]:v};lsSet(LS_SETTINGS,n);return n;});
  const handleBillsModeChange=useCallback(m=>{setCash(prev=>convertCash(prev,billsMode,m,BILL_DENOMS.map(d=>({id:String(d),val:d}))));setBillsMode(m);},[billsMode]);
  const handleCoinsModeChange=useCallback(m=>{setCash(prev=>convertCash(prev,coinsMode,m,COIN_DENOMS));setCoinsMode(m);},[coinsMode]);
  const handleManualInput=useCallback((id,val,mode)=>{
    const re=mode==='count'?/^\d*$/:/^\d*\.?\d*$/;
    if(val===''||re.test(val)) setCash(prev=>({...prev,[id]:val}));
  },[]);
  const handleClear=useCallback(id=>{setCash(prev=>({...prev,[id]:''}));},[]);
  const handleStep=useCallback((id,delta,denom,mode)=>{
    setCash(prev=>{
      const cur=Number(prev[id])||0,step=mode==='count'?1:denom,next=Math.max(0,cur+delta*step);
      const val=mode==='value'?parseFloat(next.toFixed(2)):Math.round(next);
      return{...prev,[id]:val===0?'':String(val)};
    });
  },[]);

  const goToResult=()=>{
    if(totalCash<=0){haptic([20,30,20]);showToast('Enter counts before calculating','error');return;}
    haptic([10,30,15]);
    // Only push to history if something was actually counted
    pushHistory({ts:Date.now(),totalCash,dropped:actualDropTotal,remaining:remainingDrawer,target:TARGET,dropDetails});
    if(settings.gamification&&actualDropTotal>0&&actualDropTotal>recordDrop){
      lsSet(LS_RECORD,actualDropTotal);setRecordDrop(actualDropTotal);
      setTimeout(()=>{haptic([12,24,12]);launchConfetti();setShowRecord(actualDropTotal);},400);
    }
    setPage(2);
    requestAnimationFrame(()=>window.scrollTo({top:0,behavior:'auto'}));
  };
  const goToCount=()=>{haptic([6]);setPage(1);requestAnimationFrame(()=>window.scrollTo({top:0,behavior:'auto'}));};
  const doReset=()=>{haptic([8,60,20]);setCash(EMPTY_CASH);setPage(1);setShowResetConfirm(false);};

  const billStep=useCallback((id,d,denom)=>handleStep(id,d,denom,billsMode),[handleStep,billsMode]);
  const coinStep=useCallback((id,d,denom)=>handleStep(id,d,denom,coinsMode),[handleStep,coinsMode]);

  return(
    <div style={{minHeight:'100vh'}}>
      <header className="gh-header">
        <div className="gh-header-brand">
          <div className="gh-logo"><i className="fa-solid fa-apple-whole" style={{fontSize:'20px'}}/></div>
          <div className="gh-header-title">Apple-Counter</div>
        </div>
        <div className="gh-header-actions" id="header-actions">
          <button className="icon-btn" onClick={toggleTheme} aria-label="Toggle theme"><Icon path={theme==='dark'?PATH.sun:PATH.moon} size={17}/></button>
          <button className="icon-btn" onClick={()=>{haptic([6]);setShowHistory(true);}} aria-label="History"><Icon path={PATH.history} size={17}/></button>
          <button className="icon-btn" onClick={()=>{haptic([6]);setShowSettings(true);}} aria-label="Settings"><Icon path={PATH.settings} size={17}/></button>
          <button className="icon-btn" onClick={()=>{haptic([5]);setShowResetConfirm(true);}} aria-label="Reset"><Icon path={PATH.refresh} size={17}/></button>
        </div>
      </header>

      <main className="main-content">
        {!ready?(
          <Skeleton/>
        ):page===1?(
          <div className="page-enter" style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <CollapsibleSection id="bills-card" label="Bills" badge={`$${fromCents(totalBillsCents).toFixed(2)}`} mode={billsMode} onModeChange={handleBillsModeChange} defaultOpen={true}>
              <div className="section-body">
                {BILL_DENOMS.map((d,i)=>(
                  <BillRow key={d} id={String(d)} label={`$${d}`} denom={d}
                    inputMode={billsMode} value={cash[String(d)]}
                    onManualInput={handleManualInput} onStep={billStep} onClear={handleClear}
                    showHint={i===0&&!hintDone} onHintDismiss={dismissHint}/>
                ))}
              </div>
            </CollapsibleSection>

            <CollapsibleSection id="coins-card" label="Coins" badge={`$${fromCents(totalCoinsCents).toFixed(2)}`} mode={coinsMode} onModeChange={handleCoinsModeChange} defaultOpen={true}>
              <div className="section-body">
                {COIN_DENOMS.map((c,i)=>(
                  <CoinRow key={c.id} id={c.id} label={c.label} denom={c.val}
                    rollCount={c.roll} inputMode={coinsMode} value={cash[c.id]}
                    onManualInput={handleManualInput} onStep={coinStep} onClear={handleClear}
                    showHint={i===0&&!hintDone} onHintDismiss={dismissHint}/>
                ))}
              </div>
            </CollapsibleSection>

            <div className="hold-hint">Tap input to type · hold +/− to count fast</div>
          </div>
        ):(
          <div className="page-enter" style={{display:'flex',flexDirection:'column',gap:'12px',paddingBottom:'16px'}}>
            <button className="back-btn" onClick={goToCount}><Icon path={PATH.arrowL} size={18}/> Back to edit</button>

            <div className="rc drop-hero">
              <div className="drop-hero-top">
                <div className="drop-eyebrow">Drop Safe</div>
                <div className="drop-amount"><CountUp key={`drop-${page}-${actualDropTotal}`} value={actualDropTotal} format={formatMoney}/></div>
                <div className="drop-sub">
                  from <CountUp key={`counted-${page}-${totalCash}`} value={totalCash} format={formatMoney}/> counted · target <CountUp key={`target-${page}-${TARGET}`} value={TARGET} format={formatMoney}/>
                </div>
              </div>
              <div style={{padding:'0 14px 14px'}}>
                <div className="pull-label" style={{marginTop:'14px'}}>Pull these bills</div>
                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                  {dropDetails.length>0?dropDetails.map(item=>(
                    <div key={item.label} className="pull-row">
                      <div className="pull-row-left">
                        <div className="pull-count">{item.count}</div>
                        <span style={{fontSize:'12px',color:'var(--t2)'}}>×</span>
                        <span className="pull-denom">{item.label}</span>
                      </div>
                      <span className="pull-value"><CountUp key={`pull-${page}-${item.label}-${item.value}`} value={item.value} format={formatMoney}/></span>
                    </div>
                  )):(
                    <div className="empty-state">
                      <div className="empty-icon"><Icon path={PATH.check} size={22}/></div>
                      <div style={{fontWeight:700,fontSize:'16px',color:'var(--t0)',marginBottom:'6px'}}>No drop required</div>
                      <div style={{fontSize:'13px',color:'var(--t1)'}}>Drawer is at or below target</div>
                    </div>
                  )}
                </div>
                {undroppableCents>0&&(
                  <div className="warn-banner">
                    <div className="warn-dot">!</div>
                    <div>
                      <div className="warn-title"><CountUp key={`undrop-${page}-${undroppableCents}`} value={fromCents(undroppableCents)} format={formatMoney}/> couldn't be dropped</div>
                      <div className="warn-body">No matching bills — this overage stays in the drawer.</div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="rc drawer-card">
              <div className="drawer-header">
                <div>
                  <div style={{fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.7px',color:'var(--t1)',marginBottom:'4px'}}>Leave in Drawer</div>
                  <div className="drawer-total"><CountUp key={`drawer-${page}-${remainingDrawer}`} value={remainingDrawer} format={formatMoney}/></div>
                </div>
                <button className="breakdown-btn" onClick={()=>{haptic([5]);setDrawerOpen(v=>!v);}}>
                  Breakdown
                  <Icon path={PATH.chevD} size={16} className={`breakdown-chev${drawerOpen?' open':''}`}/>
                </button>
              </div>
              <BreakdownCollapse open={drawerOpen}>
                <div className="breakdown-body">
                  <div style={{marginBottom:'16px'}}>
                    <div className="breakdown-section-title">
                      <span>Bills</span>
                      <span className="breakdown-subtotal">
                        <CountUp key={`bsub-${page}-${totalBillsCents}-${actualDropTotal}`} value={fromCents(totalBillsCents-toCents(actualDropTotal))} format={formatMoney}/>
                      </span>
                    </div>
                    {(()=>{
                      const rows=BILL_DENOMS.map(d=>{
                        const sv=rowValue(cash[String(d)],d,billsMode),drop=dropDetails.find(i=>i.denom===d);
                        const fv=sv-(drop?drop.value:0),fc=Math.round(fv/d);
                        if(fc<=0)return null;
                        return(
                          <div key={d} className="breakdown-row">
                            <div className="breakdown-left">
                              <div className="chip-bill">${d}</div>
                              <span className="breakdown-count">× {fc}</span>
                            </div>
                            <span className="breakdown-val">
                              <CountUp key={`brow-${page}-${d}-${fv}`} value={fv} format={formatMoney}/>
                            </span>
                          </div>
                        );
                      }).filter(Boolean);
                      return rows.length>0?rows:<div className="breakdown-empty">No bills remaining</div>;
                    })()}
                  </div>
                  <div>
                    <div className="breakdown-section-title">
                      <span>Coins</span>
                      <span className="breakdown-subtotal">
                        <CountUp key={`csub-${page}-${totalCoinsCents}`} value={fromCents(totalCoinsCents)} format={formatMoney}/>
                      </span>
                    </div>
                    {(()=>{
                      const rows=COIN_DENOMS.map(c=>{
                        const val=rowValue(cash[c.id],c.val,coinsMode),count=Math.round(fromCents(toCents(val))/c.val);
                        if(count<=0)return null;
                        return(
                          <div key={c.id} className="breakdown-row">
                            <div className="breakdown-left">
                              <div className="chip-coin">{c.label}</div>
                              <span className="breakdown-count">× {count}</span>
                            </div>
                            <span className="breakdown-val">
                              <CountUp key={`crow-${page}-${c.id}-${val}`} value={val} format={formatMoney}/>
                            </span>
                          </div>
                        );
                      }).filter(Boolean);
                      return rows.length>0?rows:<div className="breakdown-empty">No coins remaining</div>;
                    })()}
                  </div>
                </div>
              </BreakdownCollapse>
            </div>
            {/* Share / Copy report */}
            <div className="rc">
              <ShareButton report={buildReport({totalCash,actualDropTotal,remainingDrawer,TARGET,dropDetails,billsMode,cash,coinsMode})}/>
            </div>
          </div>
        )}
      </main>

      {page===1&&(
        <div className="sticky-footer" style={{bottom:`${fo}px`}}>
          {/* Total + target meta on top row */}
          <div className="footer-top-row">
            <div>
              <div className="footer-total-label">Total Counted</div>
              <AnimatedTotal value={`$${totalCash.toFixed(2)}`} className={`footer-total-value${over?' over':''}`}/>
            </div>
            <div className="target-row" style={{marginTop:0,textAlign:'right'}}>
              <div className="target-meta" style={{marginBottom:'5px',justifyContent:'flex-end'}}>
                <div className="target-label-group">
                  Target $
                  <input type="number" min="0" step="any" inputMode="decimal" className="target-input" value={targetInput} onChange={e=>setTargetInput(e.target.value)}/>
                </div>
              </div>
              {totalCash>0&&(
                <span className={`target-status${over?' over':' under'}`}>
                  {over?`+$${(totalCash-TARGET).toFixed(2)} over`:`-$${(TARGET-totalCash).toFixed(2)} short`}
                </span>
              )}
            </div>
          </div>
          {/* Progress bar */}
          <div id="progress-bar" style={{marginBottom:'10px'}}>
            <ProgressBar over={over} target={TARGET} totalCash={totalCash} recordDrop={recordDrop} gamification={settings.gamification}/>
          </div>
          {/* Full-width calculate button */}
          <button id="calc-btn" className="btn-calc" onClick={goToResult}>
            Calculate Drop <Icon path={PATH.arrowR} size={19}/>
          </button>
        </div>
      )}

      {showHistory&&<HistoryPanel onClose={()=>setShowHistory(false)} onRecordCleared={()=>{lsSet(LS_RECORD,0);setRecordDrop(0);}}/>}
      {showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)} settings={settings} onChange={changeSetting} onReplayTutorial={()=>{lsSet(LS_TUTORIAL,false);setShowTutorial(true);}} onShowAbout={()=>setShowAbout(true)} onShowChangelog={()=>setShowChangelog(true)}/>}
      {showRecord&&<NewRecord amount={showRecord} onDismiss={()=>setShowRecord(null)}/>}
      {showTutorial&&<Tutorial onDone={()=>{lsSet(LS_TUTORIAL,true);setShowTutorial(false);}}/>}
      {showAbout&&<AboutModal onClose={()=>setShowAbout(false)}/>}
      {showChangelog&&<ChangelogModal onClose={()=>setShowChangelog(false)}/>}
      {showResetConfirm&&<ConfirmModal title="Reset Counter?" body="This will clear all your current counts and start over. Your drop history will be kept." confirmLabel="Yes, Reset" onConfirm={doReset} onCancel={()=>setShowResetConfirm(false)}/>}
      <Toast toast={toast}/>
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false};}
  static getDerivedStateFromError(){return{hasError:true};}
  componentDidCatch(err){try{console.error(err);}catch{}}
  handleReload=()=>{window.location.reload();};
  handleReset=()=>{
    try{localStorage.clear();}catch{}
    window.location.reload();
  };
  render(){
    if(!this.state.hasError) return this.props.children;
    return(
      <div className="error-boundary">
        <div className="error-card">
          <div className="error-title">Something went wrong</div>
          <div className="error-body">The app hit an unexpected error. You can reload, or clear local data and try again.</div>
          <div className="error-actions">
            <button className="error-btn" onClick={this.handleReload}>Reload</button>
            <button className="error-btn danger" onClick={this.handleReset}>Clear Data &amp; Reload</button>
          </div>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary>
    <App/>
  </ErrorBoundary>
);
</script>

<script>
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>e.waitUntil(caches.open('ac-v2').then(c=>c.addAll(['/']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
}
</script>
