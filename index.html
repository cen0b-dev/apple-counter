<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Apple-Counter Drop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── GitHub Desktop Design Tokens ── */
    :root {
      --brand:            #3d6b9e;
      --brand-hover:      #4a7ab5;
      --brand-bg:         rgba(61,107,158,0.08);
      --brand-border:     rgba(61,107,158,0.2);

      --bg-primary:       #0d1117;
      --bg-secondary:     #161b22;
      --bg-tertiary:      #21262d;
      --bg-overlay:       #30363d;

      --border-color:     #30363d;
      --border-subtle:    #21262d;

      --text-primary:     #f0f6fc;
      --text-secondary:   #8b949e;
      --text-muted:       #484f58;
      --text-link:        #58a6ff;

      --green:            #3fb950;
      --green-muted:      rgba(63,185,80,0.15);
      --green-border:     rgba(63,185,80,0.3);
      --green-text:       #3fb950;

      --yellow:           #d29922;
      --yellow-muted:     rgba(187,128,9,0.15);
      --yellow-border:    rgba(187,128,9,0.3);
      --yellow-text:      #e3b341;

      --danger:           #f85149;
      --shadow-sm:        0 0 0 1px rgba(240,246,252,0.1);
      --shadow-md:        0 3px 6px rgba(0,0,0,0.4);
      --shadow-lg:        0 8px 24px rgba(0,0,0,0.5);

      --radius-sm:        6px;
      --radius-md:        8px;
      --radius-lg:        12px;
      --font:             'Segoe UI', -apple-system, BlinkMacSystemFont, 'Noto Sans', Helvetica, Arial, sans-serif;
    }

    /* ── Light Mode ── */
    html[data-theme="light"] {
      --bg-primary:       #ffffff;
      --bg-secondary:     #f6f8fa;
      --bg-tertiary:      #eaeef2;
      --bg-overlay:       #d0d7de;

      --border-color:     #d0d7de;
      --border-subtle:    #eaeef2;

      --text-primary:     #1f2328;
      --text-secondary:   #656d76;
      --text-muted:       #9198a1;

      --brand:            #0550ae;
      --brand-hover:      #0440a0;
      --brand-bg:         rgba(5,80,174,0.06);
      --brand-border:     rgba(5,80,174,0.15);
      --text-link:        #0550ae;

      --green:            #1a7f37;
      --green-muted:      rgba(26,127,55,0.1);
      --green-border:     rgba(26,127,55,0.25);
      --green-text:       #1a7f37;

      --yellow-text:      #9a6700;
      --yellow-muted:     rgba(154,103,0,0.1);
      --yellow-border:    rgba(154,103,0,0.25);

      --shadow-sm:        0 1px 3px rgba(31,35,40,0.12);
      --shadow-md:        0 3px 6px rgba(31,35,40,0.15);
      --shadow-lg:        0 8px 24px rgba(31,35,40,0.15);
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }
    body, * { -ms-overflow-style: none; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }

    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.25s ease, color 0.25s ease;
      min-height: 100vh;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      width: 44px; height: 44px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }
    .theme-toggle:hover { background: var(--bg-overlay); color: var(--text-primary); }
    .theme-toggle:active { transform: scale(0.93); }

    /* ── Header ── */
    .gh-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 30;
    }
    .gh-header-brand {
      display: flex; align-items: center; gap: 12px;
    }
    .gh-logo {
      width: 36px; height: 36px;
      background: var(--brand);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff; letter-spacing: -0.5px;
    }
    .gh-header-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .gh-header-sub   { font-size: 11px; color: var(--text-secondary); letter-spacing: 0.5px; text-transform: uppercase; }
    .gh-header-actions { display: flex; gap: 10px; }

    /* ── Icon Button ── */
    .gh-btn-icon {
      width: 44px; height: 44px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-secondary);
      transition: all 0.15s; font-size: 0;
    }
    .gh-btn-icon:hover  { background: var(--bg-overlay); color: var(--text-primary); border-color: var(--text-muted); }
    .gh-btn-icon:active { transform: scale(0.93); }

    /* ── Primary button ── */
    .gh-btn-primary {
      background: #238636;
      border: 1px solid rgba(63,185,80,0.4);
      color: #fff;
      font-size: 16px; font-weight: 600;
      padding: 0 22px;
      height: 50px;
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.15s;
      box-shadow: 0 0 0 0 rgba(35,134,54,0);
      white-space: nowrap;
    }
    .gh-btn-primary:hover  { background: #2ea043; box-shadow: 0 0 0 3px rgba(35,134,54,0.3); }
    .gh-btn-primary:active { transform: scale(0.97); }

    html[data-theme="light"] .gh-btn-primary {
      background: #1f883d;
      border-color: rgba(31,136,61,0.4);
    }
    html[data-theme="light"] .gh-btn-primary:hover {
      background: #1a7f37;
      box-shadow: 0 0 0 3px rgba(31,136,61,0.25);
    }
    /* hint text below list */
    .hold-hint { text-align:center; font-size:12px; color:var(--text-muted); padding-bottom:4px; letter-spacing:0.3px; }

    /* ── Card / Section ── */
    .gh-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .gh-card-header {
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
      padding: 13px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .gh-section-label {
      font-size: 14px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--text-secondary);
    }
    .gh-badge {
      font-size: 13px; font-weight: 700;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }

    /* ── Mode toggle (Count/Value) ── */
    .mode-toggle {
      display: flex;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 3px;
    }
    .mode-btn {
      padding: 6px 14px;
      font-size: 12px; font-weight: 700;
      border-radius: 5px;
      cursor: pointer; transition: all 0.15s;
      color: var(--text-secondary);
      border: none; background: transparent;
      min-height: 32px;
    }
    .mode-btn.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    /* ── Denom rows ── */
    .denom-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-md);
      transition: background 0.1s;
      min-height: 58px;
    }
    .denom-row.has-value {
      background: var(--green-muted);
      outline: 1px solid var(--green-border);
    }
    .denom-row:not(.has-value):hover { background: var(--bg-tertiary); }

    .denom-label-bill {
      width: 44px; text-align: center;
      font-size: 15px; font-weight: 800;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .denom-label-bill.active { color: var(--green-text); }

    .denom-label-coin {
      width: 42px; height: 42px; flex-shrink: 0;
      border-radius: 50%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .denom-label-coin.active {
      background: var(--green-muted);
      border-color: var(--green-border);
      color: var(--green-text);
    }

    .denom-input-wrap { position: relative; flex: 1; min-width: 0; }
    .denom-prefix {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      font-size: 15px; font-weight: 600; color: var(--text-muted);
      pointer-events: none; user-select: none;
    }
    .denom-input {
      width: 100%;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      height: 44px; padding: 0 52px 0 12px;
      font-size: 17px; font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      transition: border 0.15s, background 0.15s;
    }
    .denom-input.has-prefix { padding-left: 28px; }
    .denom-input:focus {
      outline: none;
      border-color: var(--bg-overlay);
      background: var(--bg-secondary);
    }
    .denom-input::placeholder { color: var(--text-muted); font-weight: 400; }

    /* ── Stepper buttons ── */
    .stepper {
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .step-btn {
      width: 44px; height: 44px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-secondary);
      transition: all 0.1s;
    }
    .step-btn:hover  { background: var(--bg-overlay); color: var(--text-primary); }
    .step-btn:active { transform: scale(0.9); }
    .step-btn.plus.active { border-color: var(--green-border); color: var(--green-text); }

    /* Roll button */
    .roll-btn {
      height: 44px; min-width: 54px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; cursor: pointer; color: var(--brand);
      transition: all 0.1s; padding: 0 8px;
    }
    .roll-btn:hover  { background: var(--brand-bg); border-color: var(--brand-border); }
    .roll-btn:active { transform: scale(0.93); }
    .roll-btn-icons  { display: flex; align-items: center; gap: 2px; }
    .roll-btn-label  { font-size: 9px; font-weight: 800; opacity: 0.75; letter-spacing: 0.3px; }

    /* ── Sticky footer (step 1) ── */
    .sticky-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 14px 18px 28px;
      z-index: 20;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    html[data-theme="light"] .sticky-footer { box-shadow: 0 -4px 20px rgba(31,35,40,0.12); }
    .footer-row { display: flex; align-items: center; gap: 14px; }
    .footer-total-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-secondary); margin-bottom: 2px; }
    .footer-total-value {
      font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums;
      color: var(--text-primary); line-height: 1.1;
      transition: color 0.2s;
    }
    .footer-total-value.over { color: var(--green-text); }

    /* Progress bar row */
    .target-row { margin-top: 12px; }
    .target-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .target-label-group { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); }
    .target-input {
      width: 72px; background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 4px 8px; text-align: center;
      font-size: 14px; font-weight: 700;
      color: var(--text-primary); font-variant-numeric: tabular-nums;
      height: 34px;
    }
    .target-input:focus { outline: none; border-color: var(--bg-overlay); background: var(--bg-secondary); }
    .target-status { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; font-variant-numeric: tabular-nums; }
    .target-status.over   { color: var(--green-text); }
    .target-status.under  { color: var(--text-muted); }

    .progress-track {
      height: 5px; background: var(--bg-overlay);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: var(--green); transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-fill.under { background: var(--bg-overlay); }

    /* ── Step 2 ── */
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 16px; font-weight: 600; color: var(--text-secondary);
      cursor: pointer; border: none; background: none; padding: 6px 0;
      transition: color 0.15s; min-height: 44px;
    }
    .back-btn:hover { color: var(--text-primary); }
    .back-btn:active { transform: scale(0.97); }

    /* Hero drop card */
    .drop-hero {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .drop-hero-top {
      background: linear-gradient(to bottom, rgba(35,134,54,0.15), rgba(35,134,54,0.05));
      border-bottom: 1px solid var(--green-border);
      padding: 32px 24px 26px;
      text-align: center;
    }
    html[data-theme="light"] .drop-hero-top {
      background: linear-gradient(to bottom, rgba(26,127,55,0.1), rgba(26,127,55,0.03));
    }
    .drop-eyebrow { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--green-text); margin-bottom: 10px; }
    .drop-amount  { font-size: 56px; font-weight: 800; color: var(--text-primary); letter-spacing: -2px; font-variant-numeric: tabular-nums; line-height: 1; }
    .drop-sub     { font-size: 13px; color: var(--text-secondary); margin-top: 10px; }

    .pull-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); text-align: center; padding: 16px 0 12px; }

    .pull-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      min-height: 58px;
    }
    .pull-row-left  { display: flex; align-items: center; gap: 14px; }
    .pull-count-bubble {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--green-muted); border: 1px solid var(--green-border);
      color: var(--green-text); font-weight: 800; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .pull-denom  { font-size: 22px; font-weight: 800; color: var(--text-primary); }
    .pull-value  { font-size: 18px; font-weight: 800; color: var(--green-text); font-variant-numeric: tabular-nums; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 32px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color); border-radius: var(--radius-sm);
    }
    .empty-icon {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--green-muted); border: 1px solid var(--green-border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px; color: var(--green-text);
    }

    /* Warn banner */
    .warn-banner {
      display: flex; gap: 12px; align-items: flex-start;
      background: var(--yellow-muted); border: 1px solid var(--yellow-border);
      border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 10px;
    }
    .warn-dot {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
      background: rgba(210,153,34,0.2); border: 1px solid var(--yellow-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 900; color: var(--yellow-text);
    }
    .warn-title { font-size: 14px; font-weight: 700; color: var(--yellow-text); }
    .warn-body  { font-size: 12px; color: var(--yellow-text); opacity: 0.7; margin-top: 3px; }

    /* Drawer section */
    .drawer-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .drawer-header {
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-total { font-size: 32px; font-weight: 800; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
    .breakdown-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text-secondary);
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); padding: 8px 14px;
      min-height: 44px;
      cursor: pointer; transition: all 0.15s;
    }
    .breakdown-btn:hover { background: var(--bg-overlay); color: var(--text-primary); }
    .breakdown-btn:active { transform: scale(0.95); }

    .breakdown-body { padding: 18px 20px; }
    .breakdown-section-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px; margin-bottom: 4px;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .breakdown-subtotal { font-weight: 700; color: var(--green-text); font-size: 13px; font-variant-numeric: tabular-nums; }
    .breakdown-denom-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border-subtle);
      min-height: 48px;
    }
    .breakdown-denom-row:last-child { border-bottom: none; }
    .breakdown-left  { display: flex; align-items: center; gap: 12px; }
    .breakdown-chip-bill {
      height: 28px; min-width: 48px; padding: 0 10px;
      background: var(--bg-tertiary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 700; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
    }
    .breakdown-chip-coin {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-tertiary); border: 1px solid var(--border-color);
      font-size: 10px; font-weight: 700; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
    }
    .breakdown-count { font-size: 13px; color: var(--text-muted); }
    .breakdown-val   { font-size: 16px; font-weight: 800; color: var(--green-text); font-variant-numeric: tabular-nums; }
    .breakdown-empty { font-size: 13px; font-style: italic; color: var(--text-muted); text-align: center; padding: 16px 0; }

    /* ── History panel ── */
    .history-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 50; display: flex; align-items: flex-end;
      backdrop-filter: blur(4px);
    }
    html[data-theme="light"] .history-backdrop { background: rgba(0,0,0,0.3); }
    .history-sheet {
      background: var(--bg-secondary);
      width: 100%; max-width: 480px; margin: 0 auto;
      border-radius: 18px 18px 0 0;
      max-height: 82vh; display: flex; flex-direction: column;
      border: 1px solid var(--border-color); border-bottom: none;
      box-shadow: var(--shadow-lg);
    }
    .history-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
    .history-handle-bar { width: 36px; height: 4px; background: var(--bg-overlay); border-radius: 99px; }
    .history-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 14px; border-bottom: 1px solid var(--border-color);
    }
    .history-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary); }
    .history-clear { font-size: 14px; font-weight: 700; color: var(--danger); cursor: pointer; border: none; background: none; transition: opacity 0.15s; min-height: 44px; padding: 0 4px; }
    .history-clear:hover { opacity: 0.8; }
    .history-body { overflow-y: auto; flex: 1; }
    .history-entry { padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); }
    .history-meta  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .history-time  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); }
    .history-target{ font-size: 11px; font-weight: 700; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
    .stat-pill {
      border-radius: var(--radius-sm); padding: 9px 10px; text-align: center;
      border: 1px solid var(--border-color);
    }
    .stat-pill.neutral { background: var(--bg-tertiary); }
    .stat-pill.green   { background: var(--green-muted); border-color: var(--green-border); }
    .stat-pill.dark    { background: var(--bg-primary); }
    .stat-pill-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px; }
    .stat-pill-value { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text-primary); }
    .stat-pill.green .stat-pill-value { color: var(--green-text); }
    .history-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .history-chip {
      font-size: 11px; font-weight: 700;
      background: var(--bg-tertiary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); padding: 3px 9px; color: var(--text-secondary);
    }
    .history-empty { text-align: center; padding: 70px 20px; color: var(--text-secondary); }
    .history-empty-icon {
      width: 52px; height: 52px; border-radius: var(--radius-md);
      background: var(--bg-tertiary); border: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px; color: var(--text-muted);
    }

    /* ── Layout ── */
    .main-content { max-width: 480px; margin: 0 auto; padding: 16px 16px 160px; }
    .section-body  { padding: 10px; display: flex; flex-direction: column; gap: 5px; }
    .section-spacer { height: 12px; }

    /* ── Misc transitions ── */
    .gh-card, .drop-hero, .drawer-card, .denom-row, .step-btn, .roll-btn, .breakdown-btn {
      transition-property: background, border-color, box-shadow, color;
      transition-duration: 0.2s;
    }

    button, input { -webkit-tap-highlight-color: transparent; }
    button:focus, input:focus { outline: none; }
    :focus-visible { outline: none; }

    /* ── Row subtotal hint ── */
    .row-sub {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      pointer-events: none; user-select: none; font-variant-numeric: tabular-nums;
      letter-spacing: 0.2px;
    }

    /* ── Total bump animation ── */
    @keyframes bump {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .total-bump { animation: bump 0.18s ease-out; }

    svg { display: inline-block; vertical-align: middle; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, memo } = React;

/* ── Icons ── */
const Icon = ({ d, size = 16, ...p }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p} dangerouslySetInnerHTML={{ __html: d }} />
);
const Plus       = p => <Icon d='<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>' {...p}/>;
const Minus      = p => <Icon d='<line x1="5" y1="12" x2="19" y2="12"/>' {...p}/>;
const ArrowRight = p => <Icon d='<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>' {...p}/>;
const ArrowLeft  = p => <Icon d='<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>' {...p}/>;
const Refresh    = p => <Icon d='<path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>' {...p}/>;
const Check      = p => <Icon d='<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>' {...p}/>;
const CoinIcon   = p => <Icon d='<circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/>' {...p}/>;
const ChevDown   = p => <Icon d='<path d="m6 9 6 6 6-6"/>' {...p}/>;
const ChevUp     = p => <Icon d='<path d="m18 15-6-6-6 6"/>' {...p}/>;
const ClockIcon  = p => <Icon d='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' {...p}/>;
const HistoryIco = p => <Icon d='<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>' {...p}/>;
const CloseX     = p => <Icon d='<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>' {...p}/>;
const SunIcon    = p => <Icon d='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>' {...p}/>;
const MoonIcon   = p => <Icon d='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>' {...p}/>;

/* ── Constants ── */
const BILL_DENOMS = [100,50,20,10,5,1];
const COIN_DENOMS = [
  {id:'1.00', label:'100¢', val:1.00, roll:null},
  {id:'0.50', label:'50¢',  val:0.50, roll:null},
  {id:'0.25', label:'25¢',  val:0.25, roll:40},
  {id:'0.10', label:'10¢',  val:0.10, roll:50},
  {id:'0.05', label:'5¢',   val:0.05, roll:40},
  {id:'0.01', label:'1¢',   val:0.01, roll:50},
];
const EMPTY_CASH = {
  '100':'','50':'','20':'','10':'','5':'','1':'',
  '1.00':'','0.50':'','0.25':'','0.10':'','0.05':'','0.01':''
};
const LS_HISTORY = 'ac_history_v2';

const haptic = (p=[8]) => { try { navigator.vibrate?.(p); } catch {} };
const toCents   = n => Math.round(n*100);
const fromCents = c => c/100;

function getEntryValue(cash,id,denom,mode){
  const raw=Number(cash[id])||0;
  return mode==='value'?raw:fromCents(Math.floor(raw)*toCents(denom));
}
function getEntryCount(cash,id,denom,mode){
  const raw=Number(cash[id])||0;
  return mode==='count'?Math.floor(raw):Math.floor(toCents(raw)/toCents(denom));
}
function computeDropInstructions(cash,billsMode,dropAmount){
  let remaining=toCents(dropAmount);
  const out=[];
  for(const d of BILL_DENOMS){
    const avail=getEntryCount(cash,d.toString(),d,billsMode);
    const dc=toCents(d);
    let take=0;
    for(let i=0;i<avail;i++){if(remaining>=dc){take++;remaining-=dc;}}
    if(take>0) out.push({label:`$${d}`,count:take,value:take*d,denom:d});
  }
  return out;
}
function loadHistory(){ try{return JSON.parse(localStorage.getItem(LS_HISTORY)||'[]');}catch{return [];} }
function saveHistory(e){ try{ const h=loadHistory(); h.unshift(e); localStorage.setItem(LS_HISTORY,JSON.stringify(h.slice(0,20)));} catch{} }
function formatTime(ts){ return new Date(ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }

/* ── Convert all cash fields between count and value modes ── */
function convertCash(cash, fromMode, toMode, denoms) {
  // denoms: array of {id, val}
  const next = {...cash};
  for (const {id, val} of denoms) {
    const raw = Number(cash[id]) || 0;
    if (raw === 0) continue;
    if (fromMode === 'count' && toMode === 'value') {
      // count → value: multiply count by denom
      const dollars = parseFloat((Math.floor(raw) * val).toFixed(2));
      next[id] = dollars === 0 ? '' : dollars.toString();
    } else if (fromMode === 'value' && toMode === 'count') {
      // value → count: divide value by denom, floor
      const count = Math.floor(toCents(raw) / toCents(val));
      next[id] = count === 0 ? '' : count.toString();
    }
  }
  return next;
}

/* ── Mode Toggle ── */
const ModeToggle = ({mode, onChange}) => (
  <div className="mode-toggle">
    <button className={`mode-btn ${mode==='count'?'active':''}`} onClick={()=>{haptic([5]);onChange('count');}}>Count</button>
    <button className={`mode-btn ${mode==='value'?'active':''}`} onClick={()=>{haptic([5]);onChange('value');}}>Value</button>
  </div>
);

/* ── Inline subtotal for a row ── */
function rowSubtotal(value, denom, mode) {
  const raw = Number(value) || 0;
  if (raw === 0) return null;
  if (mode === 'count') {
    const dollars = parseFloat((Math.floor(raw) * denom).toFixed(2));
    return `= $${dollars.toFixed(2)}`;
  } else {
    const count = Math.floor(toCents(raw) / toCents(denom));
    return `= ${count}×`;
  }
}

/* ── BillRow ── */
const BillRow = memo(({id,label,denom,inputMode,value,onManualInput,onUpdate,onClear}) => {
  const has = Number(value) > 0;
  const sub = rowSubtotal(value, denom, inputMode);
  const holdTimer = useRef(null);

  const startHold = () => {
    holdTimer.current = setTimeout(() => {
      if (has) { haptic([10,40,20]); onClear(id); }
    }, 600);
  };
  const cancelHold = () => clearTimeout(holdTimer.current);

  return (
    <div className={`denom-row${has?' has-value':''}`}>
      <span className={`denom-label-bill${has?' active':''}`}>{label}</span>
      <div className="denom-input-wrap">
        {inputMode==='value'&&<span className="denom-prefix">$</span>}
        <input type="number" min="0" step="any" inputMode="decimal"
          className={`denom-input${inputMode==='value'?' has-prefix':''}`}
          value={value} onChange={e=>onManualInput(id,e.target.value)} placeholder="0"/>
        {sub && <span className="row-sub">{sub}</span>}
      </div>
      <div className="stepper">
        <button
          onPointerDown={()=>{ haptic([5]); startHold(); }}
          onPointerUp={cancelHold} onPointerLeave={cancelHold}
          onClick={()=>onUpdate(id,-1,denom)}
          className="step-btn"
          title="Hold to clear"
        ><Minus size={18}/></button>
        <button onPointerDown={()=>haptic([8])} onClick={()=>onUpdate(id,1,denom)} className={`step-btn plus${has?' active':''}`}><Plus size={18}/></button>
      </div>
    </div>
  );
});

/* ── CoinRow ── */
const CoinRow = memo(({id,label,denom,inputMode,value,onManualInput,onUpdate,rollCount,onClear}) => {
  const has = Number(value) > 0;
  const sub = rowSubtotal(value, denom, inputMode);
  const holdTimer = useRef(null);

  const startHold = () => {
    holdTimer.current = setTimeout(() => {
      if (has) { haptic([10,40,20]); onClear(id); }
    }, 600);
  };
  const cancelHold = () => clearTimeout(holdTimer.current);

  return (
    <div className={`denom-row${has?' has-value':''}`}>
      <div className={`denom-label-coin${has?' active':''}`}>{label}</div>
      <div className="denom-input-wrap">
        {inputMode==='value'&&<span className="denom-prefix">$</span>}
        <input type="number" min="0" step="any" inputMode="decimal"
          className={`denom-input${inputMode==='value'?' has-prefix':''}`}
          value={value} onChange={e=>onManualInput(id,e.target.value)} placeholder="0"/>
        {sub && <span className="row-sub">{sub}</span>}
      </div>
      <div className="stepper">
        <button
          onPointerDown={()=>{ haptic([5]); startHold(); }}
          onPointerUp={cancelHold} onPointerLeave={cancelHold}
          onClick={()=>onUpdate(id,-1,denom)}
          className="step-btn"
          title="Hold to clear"
        ><Minus size={16}/></button>
        <button onPointerDown={()=>haptic([7])} onClick={()=>onUpdate(id,1,denom)} className={`step-btn plus${has?' active':''}`}><Plus size={16}/></button>
        {rollCount&&(
          <button onPointerDown={()=>haptic([6,30,10])} onClick={()=>onUpdate(id,rollCount,denom)} className="roll-btn">
            <div className="roll-btn-icons"><Plus size={11}/><CoinIcon size={14}/></div>
            <span className="roll-btn-label">
              {inputMode==='count'?`+${rollCount}`:`+$${(rollCount*denom).toFixed(0)}`}
            </span>
          </button>
        )}
      </div>
    </div>
  );
});

/* ── Animated number ── */
function AnimatedTotal({value, className}) {
  const [display, setDisplay] = useState(value);
  const [bump, setBump] = useState(false);
  const prev = useRef(value);
  useEffect(()=>{
    if (value !== prev.current) {
      setBump(true);
      setTimeout(()=>setBump(false), 200);
      prev.current = value;
    }
    setDisplay(value);
  }, [value]);
  return (
    <div className={`${className}${bump?' total-bump':''}`}>{display}</div>
  );
}

/* ── History Panel ── */
const HistoryPanel = ({onClose}) => {
  const [history,setHistory]=useState(loadHistory);
  const sheetRef = useRef(null);
  const startY = useRef(null);

  // Swipe-down to dismiss
  const onTouchStart = e => { startY.current = e.touches[0].clientY; };
  const onTouchMove  = e => {
    if (startY.current === null) return;
    const dy = e.touches[0].clientY - startY.current;
    if (dy > 0 && sheetRef.current) sheetRef.current.style.transform = `translateY(${dy}px)`;
  };
  const onTouchEnd = e => {
    if (startY.current === null) return;
    const dy = e.changedTouches[0].clientY - startY.current;
    if (sheetRef.current) sheetRef.current.style.transform = '';
    if (dy > 80) { haptic([6]); onClose(); }
    startY.current = null;
  };

  const clearHistory=()=>{ haptic([8,60,15]); if(window.confirm('Clear all drop history?')){ localStorage.removeItem(LS_HISTORY); setHistory([]); } };
  const handleBd=e=>{ if(e.target===e.currentTarget){haptic([6]);onClose();} };
  return (
    <div className="history-backdrop" onClick={handleBd}>
      <div className="history-sheet" ref={sheetRef}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        style={{transition:'transform 0.05s'}}>
        <div className="history-handle"><div className="history-handle-bar"/></div>
        <div className="history-hd">
          <span className="history-title">Drop History</span>
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            {history.length>0&&<button className="history-clear" onClick={clearHistory}>Clear All</button>}
            <button className="gh-btn-icon" onClick={()=>{haptic([6]);onClose();}}><CloseX size={18}/></button>
          </div>
        </div>
        <div className="history-body">
          {history.length===0?(
            <div className="history-empty">
              <div className="history-empty-icon"><ClockIcon size={22}/></div>
              <div style={{fontWeight:700,fontSize:'15px',marginBottom:'6px'}}>No drops yet</div>
              <div style={{fontSize:'13px',opacity:0.6}}>Completed counts will appear here</div>
            </div>
          ):history.map((e,i)=>(
            <div key={i} className="history-entry">
              <div className="history-meta">
                <span className="history-time">{formatTime(e.ts)}</span>
                <span className="history-target">target ${e.target?.toFixed(2)}</span>
              </div>
              <div className="stat-grid">
                <div className="stat-pill neutral"><div className="stat-pill-label">Counted</div><div className="stat-pill-value">${e.totalCash.toFixed(2)}</div></div>
                <div className="stat-pill green"><div className="stat-pill-label">Dropped</div><div className="stat-pill-value">${e.dropped.toFixed(2)}</div></div>
                <div className="stat-pill dark"><div className="stat-pill-label">Remains</div><div className="stat-pill-value">${e.remaining.toFixed(2)}</div></div>
              </div>
              {e.dropDetails?.length>0&&(
                <div className="history-chips">
                  {e.dropDetails.map(d=>(
                    <span key={d.label} className="history-chip">{d.count}× {d.label}</span>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ── App ── */
function App(){
  const [theme,setTheme]=useState('dark');
  const [targetInput,setTargetInput]=useState('200');
  const TARGET=Math.max(0,Number(targetInput)||0);
  const [billsMode,setBillsMode]=useState('count');
  const [coinsMode,setCoinsMode]=useState('count');
  const [cash,setCash]=useState(EMPTY_CASH);
  const [step,setStep]=useState(1);
  const [drawerOpen,setDrawerOpen]=useState(true);
  const [showHistory,setShowHistory]=useState(false);
  const [savedToHistory,setSavedToHistory]=useState(false);

  useEffect(()=>{ document.documentElement.setAttribute('data-theme',theme); },[theme]);
  const toggleTheme=()=>{ haptic([5]); setTheme(t=>t==='dark'?'light':'dark'); };

  /* ── Mode change with conversion ── */
  const handleBillsModeChange = useCallback((newMode) => {
    setCash(prev => convertCash(prev, billsMode, newMode,
      BILL_DENOMS.map(d => ({id: d.toString(), val: d}))
    ));
    setBillsMode(newMode);
  }, [billsMode]);

  const handleCoinsModeChange = useCallback((newMode) => {
    setCash(prev => convertCash(prev, coinsMode, newMode, COIN_DENOMS.map(c => ({id: c.id, val: c.val}))));
    setCoinsMode(newMode);
  }, [coinsMode]);

  const totalBillsCents=BILL_DENOMS.reduce((s,d)=>s+toCents(getEntryValue(cash,d.toString(),d,billsMode)),0);
  const totalCoinsCents=COIN_DENOMS.reduce((s,c)=>s+toCents(getEntryValue(cash,c.id,c.val,coinsMode)),0);
  const totalCents=totalBillsCents+totalCoinsCents;
  const totalCash=fromCents(totalCents);
  const overageCents=totalCents-toCents(TARGET);
  const dropAmount=fromCents(Math.max(0,Math.floor(overageCents/100)*100));
  const dropDetails=computeDropInstructions(cash,billsMode,dropAmount);
  const actualDropTotal=dropDetails.reduce((s,i)=>s+i.value,0);
  const remainingInDrawer=fromCents(totalCents-toCents(actualDropTotal));
  const undroppableCents=overageCents>0?toCents(dropAmount)-toCents(actualDropTotal):0;

  useEffect(()=>{
    if(step===2&&!savedToHistory){
      saveHistory({ts:Date.now(),totalCash,dropped:actualDropTotal,remaining:remainingInDrawer,target:TARGET,dropDetails});
      setSavedToHistory(true);
    }
  },[step]);

  const handleManualInput=useCallback((id,val)=>{
    if(val===''||/^\d*\.?\d*$/.test(val)) setCash(prev=>({...prev,[id]:val}));
  },[]);

  const updateVal=useCallback((id,delta,denom,mode)=>{
    setCash(prev=>{
      const cur=Number(prev[id])||0;
      const stepAmt=mode==='count'?1:denom;
      const next=Math.max(0,cur+delta*stepAmt);
      const rounded=mode==='value'?parseFloat(next.toFixed(2)):Math.round(next);
      return {...prev,[id]:rounded===0?'':rounded.toString()};
    });
  },[]);

  /* Hold-to-clear a single row */
  const clearRow=useCallback((id)=>{
    setCash(prev=>({...prev,[id]:''}));
  },[]);

  const goStep2=()=>{ haptic([10,30,15]); setStep(2); setSavedToHistory(false); setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),10); };
  const goStep1=()=>{ haptic([6]); setStep(1); setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),10); };
  const resetAll=()=>{ haptic([8,60,20]); if(window.confirm('Clear all counts and start over?')){ setCash(EMPTY_CASH); setStep(1); setSavedToHistory(false); } };

  const pct=TARGET>0?Math.min(100,(totalCash/TARGET)*100):0;
  const over=totalCash>=TARGET;

  return (
    <div style={{minHeight:'100vh'}}>
      {/* Header */}
      <header className="gh-header">
        <div className="gh-header-brand">
          <div className="gh-logo">AC</div>
          <div>
            <div className="gh-header-title">Apple-Counter</div>
            <div className="gh-header-sub">.site</div>
          </div>
        </div>
        <div className="gh-header-actions">
          <button className="theme-toggle" onClick={toggleTheme} aria-label="Toggle theme">
            {theme==='dark'?<SunIcon size={18}/>:<MoonIcon size={18}/>}
          </button>
          <button className="gh-btn-icon" onClick={()=>{haptic([6]);setShowHistory(true);}} aria-label="History"><HistoryIco size={18}/></button>
          <button className="gh-btn-icon" onClick={resetAll} aria-label="Reset"><Refresh size={18}/></button>
        </div>
      </header>

      <main className="main-content">
        {/* ── STEP 1 ── */}
        {step===1&&(
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            {/* Bills */}
            <div className="gh-card">
              <div className="gh-card-header">
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span className="gh-section-label">Bills</span>
                  <span className="gh-badge">${totalBillsCents>0?(totalBillsCents/100).toFixed(2):'0.00'}</span>
                </div>
                <ModeToggle mode={billsMode} onChange={handleBillsModeChange}/>
              </div>
              <div className="section-body">
                {BILL_DENOMS.map(d=>(
                  <BillRow key={d} id={d.toString()} label={`$${d}`} denom={d}
                    inputMode={billsMode} value={cash[d.toString()]}
                    onManualInput={handleManualInput}
                    onUpdate={(id,dlt,dnm)=>updateVal(id,dlt,dnm,billsMode)}
                    onClear={clearRow}/>
                ))}
              </div>
            </div>

            {/* Coins */}
            <div className="gh-card">
              <div className="gh-card-header">
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span className="gh-section-label">Coins</span>
                  <span className="gh-badge">${totalCoinsCents>0?(totalCoinsCents/100).toFixed(2):'0.00'}</span>
                </div>
                <ModeToggle mode={coinsMode} onChange={handleCoinsModeChange}/>
              </div>
              <div className="section-body">
                {COIN_DENOMS.map(c=>(
                  <CoinRow key={c.id} id={c.id} label={c.label} denom={c.val}
                    rollCount={c.roll} inputMode={coinsMode}
                    value={cash[c.id]} onManualInput={handleManualInput}
                    onUpdate={(id,dlt,dnm)=>updateVal(id,dlt,dnm,coinsMode)}
                    onClear={clearRow}/>
                ))}
              </div>
            </div>

            {/* Hold-to-clear hint */}
            <div className="hold-hint">Hold − to clear a row</div>
          </div>
        )}

        {/* ── STEP 2 ── */}
        {step===2&&(
          <div style={{display:'flex',flexDirection:'column',gap:'12px',paddingBottom:'16px'}}>
            <button className="back-btn" onClick={goStep1}>
              <ArrowLeft size={18}/> Back to edit
            </button>

            {/* Drop hero */}
            <div className="drop-hero">
              <div className="drop-hero-top">
                <div className="drop-eyebrow">Drop Safe</div>
                <div className="drop-amount">${actualDropTotal.toFixed(2)}</div>
                <div className="drop-sub">from ${totalCash.toFixed(2)} counted · target ${TARGET.toFixed(2)}</div>
              </div>
              <div style={{padding:'0 14px 14px'}}>
                <div className="pull-label">Pull these bills</div>
                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                  {dropDetails.length>0?dropDetails.map(item=>(
                    <div key={item.label} className="pull-row">
                      <div className="pull-row-left">
                        <div className="pull-count-bubble">{item.count}</div>
                        <span style={{fontSize:'12px',color:'var(--text-muted)'}}>×</span>
                        <span className="pull-denom">{item.label}</span>
                      </div>
                      <span className="pull-value">${item.value.toFixed(2)}</span>
                    </div>
                  )):(
                    <div className="empty-state">
                      <div className="empty-icon"><Check size={22}/></div>
                      <div style={{fontWeight:700,fontSize:'16px',color:'var(--text-primary)',marginBottom:'6px'}}>No drop required</div>
                      <div style={{fontSize:'13px',color:'var(--text-secondary)'}}>Drawer is at or below target</div>
                    </div>
                  )}
                </div>
                {undroppableCents>0&&(
                  <div className="warn-banner">
                    <div className="warn-dot">!</div>
                    <div>
                      <div className="warn-title">${fromCents(undroppableCents).toFixed(2)} couldn't be dropped</div>
                      <div className="warn-body">No matching bills — this overage stays in the drawer.</div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Drawer remaining */}
            <div className="drawer-card">
              <div className="drawer-header">
                <div>
                  <div style={{fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.7px',color:'var(--text-secondary)',marginBottom:'4px'}}>Leave in Drawer</div>
                  <div className="drawer-total">${remainingInDrawer.toFixed(2)}</div>
                </div>
                <button className="breakdown-btn" onClick={()=>{haptic([5]);setDrawerOpen(v=>!v);}}>
                  Breakdown {drawerOpen?<ChevUp size={16}/>:<ChevDown size={16}/>}
                </button>
              </div>
              {drawerOpen&&(
                <div className="breakdown-body">
                  <div style={{marginBottom:'16px'}}>
                    <div className="breakdown-section-title">
                      <span>Bills</span>
                      <span className="breakdown-subtotal">${((totalBillsCents-toCents(actualDropTotal))/100).toFixed(2)}</span>
                    </div>
                    {BILL_DENOMS.map(d=>{
                      const sv=getEntryValue(cash,d.toString(),d,billsMode);
                      const drop=dropDetails.find(i=>i.denom===d);
                      const fv=sv-(drop?drop.value:0);
                      const fc=Math.round(fv/d);
                      if(fc<=0) return null;
                      return (
                        <div key={d} className="breakdown-denom-row">
                          <div className="breakdown-left">
                            <div className="breakdown-chip-bill">${d}</div>
                            <span className="breakdown-count">× {fc}</span>
                          </div>
                          <span className="breakdown-val">${fv.toFixed(2)}</span>
                        </div>
                      );
                    })}
                    {((totalBillsCents-toCents(actualDropTotal))<=0)&&<div className="breakdown-empty">No bills remaining</div>}
                  </div>
                  <div>
                    <div className="breakdown-section-title">
                      <span>Coins</span>
                      <span className="breakdown-subtotal">${(totalCoinsCents/100).toFixed(2)}</span>
                    </div>
                    {COIN_DENOMS.map(c=>{
                      const val=getEntryValue(cash,c.id,c.val,coinsMode);
                      const count=Math.round(fromCents(toCents(val))/c.val);
                      if(count<=0) return null;
                      return (
                        <div key={c.id} className="breakdown-denom-row">
                          <div className="breakdown-left">
                            <div className="breakdown-chip-coin">{c.label}</div>
                            <span className="breakdown-count">× {count}</span>
                          </div>
                          <span className="breakdown-val">${val.toFixed(2)}</span>
                        </div>
                      );
                    })}
                    {totalCoinsCents<=0&&<div className="breakdown-empty">No coins remaining</div>}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </main>

      {/* Sticky footer – step 1 */}
      {step===1&&(
        <div className="sticky-footer">
          <div className="footer-row">
            <div style={{flex:1}}>
              <div className="footer-total-label">Total Counted</div>
              <AnimatedTotal value={`$${totalCash.toFixed(2)}`} className={`footer-total-value${over?' over':''}`}/>
            </div>
            <button className="gh-btn-primary" onPointerDown={()=>haptic([10,30,15])} onClick={goStep2}>
              Calculate <ArrowRight size={18}/>
            </button>
          </div>
          <div className="target-row">
            <div className="target-meta">
              <div className="target-label-group">
                Target $
                <input type="number" className="target-input" value={targetInput} onChange={e=>setTargetInput(e.target.value)}/>
              </div>
              {totalCash>0&&(
                <span className={`target-status${over?' over':' under'}`}>
                  {over?`+$${(totalCash-TARGET).toFixed(2)} over`:`-$${(TARGET-totalCash).toFixed(2)} short`}
                </span>
              )}
            </div>
            <div className="progress-track">
              <div className={`progress-fill${over?'':' under'}`} style={{width:`${pct}%`}}/>
            </div>
          </div>
        </div>
      )}

      {showHistory&&<HistoryPanel onClose={()=>setShowHistory(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
