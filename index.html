<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apple-Counter">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233d6b9e'/><path d='M50 20 C50 20 42 14 34 18 C26 22 24 32 28 40 C32 48 50 72 50 72 C50 72 68 48 72 40 C76 32 74 22 66 18 C58 14 50 20 50 20 Z' fill='white'/><path d='M50 20 C50 20 54 12 60 13' stroke='white' stroke-width='3' fill='none' stroke-linecap='round'/></svg>">
<title>Apple-Counter Drop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ─── THEME TRANSITION ─────────────────────────────────────────────────────────
   The background lag happens because body{background:var(--bg0)} resolves the
   CSS variable at computed-style time — when data-theme flips, the var resolves
   instantly to the new value and CSS transitions have nothing to interpolate
   *unless* background-color was already a concrete colour on the element.

   Fix: set explicit background-color on html (which covers the full viewport)
   and body using concrete hex values that we transition directly. When .thm is
   active every element transitions together. html gets the same bg so there is
   no "flash of old background" behind body.
   ─────────────────────────────────────────────────────────────────────────── */
:root{ --td:200ms }

html{
  background-color:#0d1117;
}
html[data-theme="light"]{ background-color:#fff }

body{
  background-color:#0d1117;
}
html[data-theme="light"] body{ background-color:#fff }

/* Only transition during active theme swap — applied synchronously then removed */
html.thm{
  transition:background-color var(--td) ease;
}
html.thm body,
html.thm .gh-header,
html.thm .gh-card,
html.thm .sticky-footer,
html.thm .section-toggle-btn,
html.thm .denom-row,
html.thm .denom-input,
html.thm .step-btn,
html.thm .roll-btn,
html.thm .badge,
html.thm .mode-toggle,
html.thm .mode-toggle-pill,
html.thm .icon-btn,
html.thm .btn-calc,
html.thm .progress-track,
html.thm .drawer-card,
html.thm .sheet,
html.thm .trend-card,
html.thm .breakdown-btn,
html.thm .share-btn,
html.thm .target-input,
html.thm body::before{
  transition:
    background-color var(--td) ease,
    border-color     var(--td) ease,
    box-shadow       var(--td) ease !important;
}
html.thm,
html.thm .gh-header-title,
html.thm .section-label,
html.thm .denom-label,
html.thm .denom-input,
html.thm .badge,
html.thm .mode-btn,
html.thm .step-btn,
html.thm .icon-btn,
html.thm .footer-total-label,
html.thm .footer-total-value,
html.thm .target-label-group,
html.thm .target-status,
html.thm .trend-title,
html.thm .trend-value,
html.thm .history-time,
html.thm .stat-pill-value,
html.thm .breakdown-val,
html.thm .pull-denom,
html.thm .pull-value,
html.thm .drop-amount{
  transition:color var(--td) ease !important;
}

/* ─── DESIGN TOKENS ─────────────────────────────────────────────────────────── */
:root{--brand:#3d6b9e;--brand-h:#4a7ab5;--brand-bg:rgba(61,107,158,.08);--brand-bd:rgba(61,107,158,.2);--bg0:#0d1117;--bg1:#161b22;--bg2:#21262d;--bg3:#30363d;--bd:#30363d;--bd-s:#21262d;--t0:#f0f6fc;--t1:#8b949e;--t2:#484f58;--tl:#58a6ff;--green:#3fb950;--green-bg:rgba(63,185,80,.15);--green-bd:rgba(63,185,80,.3);--yellow:#d29922;--yellow-bg:rgba(187,128,9,.15);--yellow-bd:rgba(187,128,9,.3);--yt:#e3b341;--red:#f85149;--sh-sm:0 0 0 1px rgba(240,246,252,.1);--sh-md:0 3px 6px rgba(0,0,0,.4);--sh-lg:0 8px 24px rgba(0,0,0,.5);--r-sm:6px;--r-md:8px;--r-lg:12px;--font:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans',Helvetica,Arial,sans-serif}
html[data-theme="light"]{--bg0:#fff;--bg1:#f6f8fa;--bg2:#eaeef2;--bg3:#d0d7de;--bd:#d0d7de;--bd-s:#eaeef2;--t0:#1f2328;--t1:#656d76;--t2:#9198a1;--brand:#0550ae;--brand-h:#0440a0;--brand-bg:rgba(5,80,174,.06);--brand-bd:rgba(5,80,174,.15);--tl:#0550ae;--green:#1a7f37;--green-bg:rgba(26,127,55,.1);--green-bd:rgba(26,127,55,.25);--yt:#9a6700;--yellow-bg:rgba(154,103,0,.1);--yellow-bd:rgba(154,103,0,.25);--sh-sm:0 1px 3px rgba(31,35,40,.12);--sh-md:0 3px 6px rgba(31,35,40,.15);--sh-lg:0 8px 24px rgba(31,35,40,.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type="number"]{-moz-appearance:textfield}
body,*{-ms-overflow-style:none;scrollbar-width:none}
::-webkit-scrollbar{display:none}
body{font-family:var(--font);color:var(--t0);overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button,input{-webkit-tap-highlight-color:transparent}
button{touch-action:manipulation}
button:focus,input:focus,:focus-visible{outline:none}
svg{display:inline-block;vertical-align:middle}

/* ─── SKELETON (replaces boot splash) ──────────────────────────────────────── */
.sk{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:skShim 1.4s infinite;border-radius:var(--r-md)}
@keyframes skShim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-hd{height:44px;margin-bottom:8px}
.sk-row{height:54px;margin-bottom:4px}
/* Skeleton fades out when real content takes over */
.sk-wrap{animation:skFadeIn .18s ease both}
@keyframes skFadeIn{from{opacity:0}to{opacity:1}}

/* ─── HEADER ────────────────────────────────────────────────────────────────── */
.gh-header{background:var(--bg1);border-bottom:1px solid var(--bd);padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top);background:var(--bg1);z-index:31}
.gh-header-brand{display:flex;align-items:center;gap:10px;min-width:0}
.gh-logo{width:34px;height:34px;background:var(--brand);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.gh-header-title{font-size:16px;font-weight:700;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gh-header-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:40px;height:40px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t1);font-size:0;transition:background-color .15s ease,color .15s ease,transform .12s ease}
.icon-btn:hover{background:var(--bg3);color:var(--t0)}
.icon-btn:active{transform:scale(.93);transition:transform 0s}

/* ─── COLLAPSIBLE CARD ──────────────────────────────────────────────────────── */
.gh-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r-lg);overflow:hidden}
.section-toggle-btn{width:100%;background:var(--bg2);border:none;border-bottom:1px solid var(--bd);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent;position:relative;z-index:1;user-select:none;-webkit-user-select:none}
.section-toggle-btn.pressing{background:var(--bg3)}
.section-toggle-left{display:flex;align-items:center;gap:8px}
.section-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t1)}
.badge{font-size:13px;font-weight:700;background:var(--bg0);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;color:var(--t1);font-variant-numeric:tabular-nums}
.section-toggle-right{display:flex;align-items:center;gap:8px}
.sec-chev{color:var(--t2);flex-shrink:0;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sec-chev.open{transform:rotate(180deg)}
/* ModeToggle sits inside the header – stop its clicks from bubbling to the collapse toggle */
.mode-toggle-wrap{position:relative;z-index:2}
.section-body-wrap{overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1),opacity .26s ease}
.section-body-wrap.closed{opacity:0}

/* ─── MODE TOGGLE — animated sliding pill ───────────────────────────────────── */
.mode-toggle{
  display:flex;position:relative;
  background:var(--bg0);border:1px solid var(--bd);border-radius:var(--r-sm);
  padding:3px;flex-shrink:0;
}
/* Sliding pill behind the buttons */
.mode-toggle-pill{
  position:absolute;top:3px;bottom:3px;
  background:var(--brand);
  border-radius:5px;
  box-shadow:0 1px 4px rgba(0,0,0,.35);
  transition:left .2s cubic-bezier(.4,0,.2,1),width .2s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
  z-index:0;
}
.mode-btn{
  position:relative;z-index:1;
  padding:5px 13px;font-size:12px;font-weight:700;border-radius:5px;
  cursor:pointer;border:none;background:transparent;min-height:30px;
  transition:color .2s ease;
  color:var(--t2);
}
.mode-btn.active{color:#fff;}

/* ─── TAP HINT ──────────────────────────────────────────────────────────────── */
.tap-hint{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:var(--brand);background:var(--brand-bg);border:1px solid var(--brand-bd);border-radius:4px;padding:2px 6px;pointer-events:none;white-space:nowrap;letter-spacing:.3px;display:flex;align-items:center;gap:3px}

/* ─── DENOM ROWS ────────────────────────────────────────────────────────────── */
.denom-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--r-md);min-height:56px;transition:background-color .18s ease,outline-color .18s ease}
.denom-row.has-value{background:var(--green-bg);outline:1px solid var(--green-bd)}
.denom-row:not(.has-value):hover{background:var(--bg2)}
.denom-label{width:40px;text-align:center;font-size:14px;font-weight:800;color:var(--t1);flex-shrink:0}
.denom-label.active{color:var(--green)}
.denom-input-wrap{position:relative;flex:1;min-width:0}
.denom-prefix{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;font-weight:600;color:var(--t2);pointer-events:none;user-select:none}
.denom-input{width:100%;background:var(--bg0);border:1px solid var(--bd);border-radius:var(--r-sm);height:42px;padding:0 10px;font-size:17px;font-weight:700;color:var(--t0);font-variant-numeric:tabular-nums;cursor:text;transition:background-color .18s ease,border-color .18s ease,box-shadow .18s ease}
.denom-input.has-prefix{padding-left:26px}
.denom-input:focus{border-color:var(--brand-bd);background:var(--bg1);box-shadow:0 0 0 2px var(--brand-bg)}
/* Brighter placeholder — was --t2 (#484f58 dark / #9198a1 light), now one step up */
.denom-input::placeholder{color:var(--t1);font-weight:500;opacity:.7}
.row-sub-inline{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:var(--t2);pointer-events:none;user-select:none;font-variant-numeric:tabular-nums;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--bg0);padding-left:2px}
@media(max-width:380px){.row-sub-inline{display:none}}
.stepper{display:flex;gap:5px;flex-shrink:0}
/* Step buttons: taller (48px) + wider (48px) for thumb-friendly tapping.
   An invisible ::after pseudo expands the hit area outward by 6px on each
   side without affecting layout, catching near-misses without growing the card. */
.step-btn{
  width:48px;height:48px;
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t1);
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
  position:relative;
}
.step-btn::after{
  content:'';position:absolute;
  inset:-6px;          /* expands invisible tap area 6px beyond visual bounds */
  border-radius:calc(var(--r-sm) + 6px);
}
.step-btn:active{transform:scale(.85);background:var(--bg3);transition:transform 0s}
.step-btn.plus.active{border-color:var(--green-bd);color:var(--green)}
.step-btn.repeating{box-shadow:0 0 0 2px var(--brand-bd)}
.roll-btn{height:48px;min-width:46px;max-width:58px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--brand);padding:0 6px;touch-action:manipulation}
.roll-btn:active{transform:scale(.9);transition:transform 0s}
.roll-btn-icons{display:flex;align-items:center;gap:2px}
.roll-btn-label{font-size:9px;font-weight:800;opacity:.75;letter-spacing:.3px;white-space:nowrap}
@media(max-width:380px){.roll-btn-label{display:none}}

/* ─── FOOTER — Calculate is now full-width at the bottom ───────────────────── */
.sticky-footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--bd);padding:10px 16px calc(10px + env(safe-area-inset-bottom));z-index:20;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
html[data-theme="light"] .sticky-footer{box-shadow:0 -4px 20px rgba(31,35,40,.12)}
/* Total + target row still side-by-side */
.footer-top-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.footer-total-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--t1);margin-bottom:2px}
.footer-total-value{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--t0);line-height:1.1}
.footer-total-value.over{color:var(--green)}
/* Full-width calculate button */
.btn-calc{
  width:100%;height:52px;
  background:#238636;border:1px solid rgba(63,185,80,.4);
  color:#fff;font-size:17px;font-weight:700;
  border-radius:var(--r-md);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:10px;
  box-shadow:0 2px 8px rgba(35,134,54,.25);
  transition:background-color .15s ease,transform .1s ease,box-shadow .15s ease;
}
.btn-calc:hover{background:#2ea043}
.btn-calc:active{transform:scale(.98);transition:transform 0s;background:#1e7a30}
html[data-theme="light"] .btn-calc{background:#1f883d;border-color:rgba(31,136,61,.4)}
html[data-theme="light"] .btn-calc:hover{background:#1a7f37}
.target-row{margin-top:0}
.target-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.target-label-group{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t1)}
.target-input{width:68px;background:var(--bg0);border:1px solid var(--bd);border-radius:var(--r-sm);padding:4px 8px;text-align:center;font-size:14px;font-weight:700;color:var(--t0);font-variant-numeric:tabular-nums;height:32px}
.target-input:focus{border-color:var(--brand-bd);box-shadow:0 0 0 2px var(--brand-bg)}
.target-status{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;font-variant-numeric:tabular-nums}
.target-status.over{color:var(--green)}.target-status.under{color:var(--t2)}
.progress-wrap{position:relative}
.progress-track{height:8px;background:var(--bg3);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:var(--brand);transition:width .6s cubic-bezier(.4,0,.2,1),background .3s ease}
.progress-fill.over{background:var(--green)}
/* Flag sits BELOW the bar */
.progress-flag-wrap{position:relative;left:0;right:0;height:22px;pointer-events:none;margin-top:4px}
.progress-flag{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%)}
.progress-flag-pole{width:1.5px;height:6px;background:var(--yt);opacity:.7}
.progress-flag-tag{font-size:9px;font-weight:800;background:var(--yellow-bg);border:1px solid var(--yellow-bd);color:var(--yt);border-radius:999px;padding:2px 7px;white-space:nowrap;letter-spacing:.3px;box-shadow:0 4px 10px rgba(0,0,0,.25);animation:flagFloat 2.6s ease-in-out infinite}

/* ─── PAGE TRANSITIONS ──────────────────────────────────────────────────────── */
.page-enter-right{animation:pageInRight .3s cubic-bezier(.25,.46,.45,.94) both}
.page-enter-left{animation:pageInLeft .3s cubic-bezier(.25,.46,.45,.94) both}
@keyframes pageInRight{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
@keyframes pageInLeft{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:none}}
/* keep old class as alias for anything still using it */
.page-enter{animation:pageInRight .3s cubic-bezier(.25,.46,.45,.94) both}
.back-btn{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--t1);background:none;border:none;cursor:pointer;padding:4px 0;min-height:44px}
.back-btn:hover{color:var(--t0)}
.back-btn:active{opacity:.65;transition:opacity 0s}

/* ─── RESULT ANIMATIONS ─────────────────────────────────────────────────────── */
.rc{animation:rcIn .3s ease both}
.rc:nth-child(2){animation-delay:.07s}.rc:nth-child(3){animation-delay:.14s}
@keyframes rcIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.pull-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg0);border:1px solid var(--bd);border-radius:var(--r-sm);padding:10px 14px;min-height:52px;animation:prIn .22s ease both}
.pull-row:nth-child(1){animation-delay:.04s}.pull-row:nth-child(2){animation-delay:.09s}.pull-row:nth-child(3){animation-delay:.14s}.pull-row:nth-child(4){animation-delay:.19s}.pull-row:nth-child(5){animation-delay:.24s}.pull-row:nth-child(6){animation-delay:.29s}
@keyframes prIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}

/* ─── DROP RESULT ───────────────────────────────────────────────────────────── */
.drop-hero{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r-lg);overflow:hidden}
.drop-hero-top{padding:18px 16px 14px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.drop-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t1);margin-bottom:6px}
.drop-amount{font-size:46px;font-weight:800;line-height:1;color:var(--t0);font-variant-numeric:tabular-nums;letter-spacing:-1px}
.drop-sub{font-size:12px;color:var(--t1);margin-top:6px;font-variant-numeric:tabular-nums}
.pull-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t1);margin-bottom:10px}
.pull-row-left{display:flex;align-items:center;gap:10px}
.pull-count{width:32px;height:32px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--green)}
.pull-denom{font-size:22px;font-weight:800;color:var(--t0)}
.pull-value{font-size:18px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums}
.empty-state{text-align:center;padding:32px 16px;background:var(--bg0);border:1px solid var(--bd);border-radius:var(--r-sm)}
.empty-icon{width:44px;height:44px;border-radius:50%;background:var(--green-bg);border:1px solid var(--green-bd);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:var(--green)}
.warn-banner{display:flex;gap:12px;align-items:flex-start;background:var(--yellow-bg);border:1px solid var(--yellow-bd);border-radius:var(--r-sm);padding:14px 16px;margin-top:10px}
.warn-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;margin-top:1px;background:rgba(210,153,34,.2);border:1px solid var(--yellow-bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--yt)}
.warn-title{font-size:14px;font-weight:700;color:var(--yt)}
.warn-body{font-size:12px;color:var(--yt);opacity:.7;margin-top:3px}

/* ─── BREAKDOWN COLLAPSER (animated) ───────────────────────────────────────── */
.drawer-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r-lg);overflow:hidden}
.drawer-header{background:var(--bg2);border-bottom:1px solid var(--bd);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.drawer-total{font-size:32px;font-weight:800;color:var(--t0);font-variant-numeric:tabular-nums;line-height:1}
.breakdown-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t1);background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r-sm);padding:8px 14px;min-height:44px;cursor:pointer;transition:background-color .15s ease,color .15s ease,transform .1s ease,border-color .15s ease}
.breakdown-btn:hover{background:var(--bg3);color:var(--t0)}
.breakdown-btn:active{transform:scale(.95);transition:transform 0s}
.breakdown-chev{transition:transform .25s cubic-bezier(.4,0,.2,1)}
.breakdown-chev.open{transform:rotate(180deg)}
/* animated collapse wrapper */
.breakdown-collapse{overflow:hidden;transition:max-height .34s cubic-bezier(.4,0,.2,1),opacity .28s ease}
.breakdown-collapse.closed{opacity:0;max-height:0!important}
.breakdown-body{padding:18px 20px}
.breakdown-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t1);border-bottom:1px solid var(--bd);padding-bottom:10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:baseline}
.breakdown-subtotal{font-weight:700;color:var(--green);font-size:13px;font-variant-numeric:tabular-nums}
.breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd-s);min-height:48px}
.breakdown-row:last-child{border-bottom:none}
.breakdown-left{display:flex;align-items:center;gap:12px}
.chip-bill{height:28px;min-width:48px;padding:0 10px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-sm);font-size:12px;font-weight:700;color:var(--t1);display:flex;align-items:center;justify-content:center}
.chip-coin{width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);font-size:10px;font-weight:700;color:var(--t1);display:flex;align-items:center;justify-content:center}
.breakdown-count{font-size:13px;color:var(--t2)}
.breakdown-val{font-size:16px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums}
.breakdown-empty{font-size:13px;font-style:italic;color:var(--t2);text-align:center;padding:16px 0}

/* ─── BOTTOM SHEETS ─────────────────────────────────────────────────────────
   Sheets now have an explicit closing animation.
   .sheet-backdrop:  fade in/out via data-closing attr
   .sheet:           slide up on open, slide down on close
   ─────────────────────────────────────────────────────────────────────────── */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;
  display:flex;align-items:flex-end;
  /* prevent backdrop clicks from propagating touch-move to the page beneath */
  overscroll-behavior:none;
  backdrop-filter:blur(4px);
  animation:bdIn .22s ease both;
}
.sheet-backdrop.closing{animation:bdOut .26s ease both}
html[data-theme="light"] .sheet-backdrop{background:rgba(0,0,0,.3)}
@keyframes bdIn{from{opacity:0}to{opacity:1}}
@keyframes bdOut{from{opacity:1}to{opacity:0}}

.sheet{
  background:var(--bg1);width:100%;max-width:480px;margin:0 auto;
  border-radius:18px 18px 0 0;border:1px solid var(--bd);border-bottom:none;
  box-shadow:var(--sh-lg);
  animation:shUp .32s cubic-bezier(.34,1.15,.64,1);
  overscroll-behavior:contain;
  touch-action:pan-y;
  /* GPU layer — makes drag translate3d silky smooth */
  will-change:transform;
  /* Snap back smoothly when drag is released without dismiss */
  transition:transform .12s ease;
}
.sheet-backdrop.closing .sheet{animation:shDown .26s cubic-bezier(.4,0,.8,1) both}
.sheet.scrollable{max-height:82vh;display:flex;flex-direction:column}
@keyframes shUp{from{transform:translateY(100%);opacity:.6}to{transform:translateY(0);opacity:1}}
@keyframes shDown{from{transform:translateY(0);opacity:1}to{transform:translateY(100%);opacity:0}}

.sheet-handle{display:flex;justify-content:center;padding:12px 0 4px}
.sheet-handle-bar{width:36px;height:4px;background:var(--bg3);border-radius:99px}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 14px;border-bottom:1px solid var(--bd)}
.sheet-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t1)}
.sheet-body{overflow-y:auto;flex:1;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}

/* ─── HISTORY ───────────────────────────────────────────────────────────────── */
.history-entry{padding:16px 20px;border-bottom:1px solid var(--bd-s)}
.history-entry.record{background:linear-gradient(90deg,rgba(210,153,34,.06) 0%,transparent 100%);border-left:3px solid var(--yt)}
.history-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.history-time{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t2)}
.history-target{font-size:11px;font-weight:700;color:var(--t2);font-variant-numeric:tabular-nums}
.record-badge{font-size:9px;font-weight:800;background:var(--yellow-bg);border:1px solid var(--yellow-bd);color:var(--yt);border-radius:3px;padding:2px 6px;letter-spacing:.3px;text-transform:uppercase}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat-pill{border-radius:var(--r-sm);padding:9px 10px;text-align:center;border:1px solid var(--bd)}
.stat-pill.neutral{background:var(--bg2)}.stat-pill.green{background:var(--green-bg);border-color:var(--green-bd)}.stat-pill.dark{background:var(--bg0)}
.stat-pill-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:3px}
.stat-pill-value{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--t0)}
.stat-pill.green .stat-pill-value{color:var(--green)}
.history-chips{display:flex;flex-wrap:wrap;gap:5px}
.history-chip{font-size:11px;font-weight:700;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-sm);padding:3px 9px;color:var(--t1)}
.history-empty{text-align:center;padding:70px 20px;color:var(--t1)}
.history-empty-icon{width:52px;height:52px;border-radius:var(--r-md);background:var(--bg2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--t2)}
.clear-btn{font-size:14px;font-weight:700;color:var(--red);cursor:pointer;border:none;background:none;min-height:44px;padding:0 4px}
.history-trends{padding:12px 20px;border-bottom:1px solid var(--bd-s);display:grid;grid-template-columns:1fr 1fr;gap:10px}
.trend-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r-md);padding:12px 14px;overflow:hidden;position:relative}
.trend-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t2)}
.trend-value{font-size:17px;font-weight:800;color:var(--t0);margin:4px 0 8px;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.trend-value.up{color:var(--green)}.trend-value.down{color:var(--red)}
.sparkline{width:100%;height:48px;display:block;overflow:visible}
.sparkline-dot{transform-box:fill-box;transform-origin:center;animation:dotPulse 2.4s ease-in-out infinite}

/* ─── SETTINGS ──────────────────────────────────────────────────────────────── */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd-s);min-height:60px}
.settings-row:last-child{border-bottom:none}.settings-row:active{background:var(--bg2)}
.settings-label{font-size:15px;font-weight:600;color:var(--t0)}
.settings-sub{font-size:12px;color:var(--t1);margin-top:2px}
.settings-action{font-size:14px;font-weight:600;color:var(--tl);background:none;border:none;cursor:pointer;min-height:44px;padding:0 4px}
.toggle-track{width:51px;height:28px;border-radius:99px;cursor:pointer;border:none;padding:3px;display:flex;align-items:center;flex-shrink:0;transition:background .2s ease}
.toggle-track.on{background:var(--green)}.toggle-track.off{background:var(--bg3)}
.toggle-thumb{width:22px;height:22px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3);transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.toggle-track.on .toggle-thumb{transform:translateX(23px)}
.toggle-track.off .toggle-thumb{transform:translateX(0)}

/* ─── MODALS ────────────────────────────────────────────────────────────────── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(6px);animation:bdIn .2s ease}
.modal-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r-lg);padding:28px 24px;width:100%;max-width:320px;box-shadow:var(--sh-lg);animation:slUp .3s cubic-bezier(.34,1.3,.64,1)}
@keyframes slUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:17px;font-weight:800;color:var(--t0);margin-bottom:8px;text-align:center}
.modal-body{font-size:13px;color:var(--t1);line-height:1.6;text-align:center;margin-bottom:22px}
.modal-actions{display:flex;flex-direction:column;gap:8px}
.modal-btn{width:100%;height:46px;border-radius:var(--r-md);font-size:15px;font-weight:700;cursor:pointer;border:1px solid var(--bd)}
.modal-btn.danger{background:var(--red);border-color:transparent;color:#fff}.modal-btn.danger:hover{opacity:.88}
.modal-btn.cancel{background:var(--bg2);color:var(--t1)}.modal-btn.cancel:hover{background:var(--bg3);color:var(--t0)}
.modal-btn:active{transform:scale(.97);transition:transform 0s}
.about-logo{width:64px;height:64px;background:var(--brand);border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;margin:0 auto 14px;box-shadow:0 6px 20px rgba(61,107,158,.35)}
.about-tagline{font-size:15px;font-style:italic;color:var(--brand);font-weight:600;margin-bottom:6px;text-align:center}
.about-credit{font-size:13px;color:var(--t1);text-align:center;line-height:1.6}

/* ─── CHANGELOG MODAL ───────────────────────────────────────────────────────── */
.changelog-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r-lg);padding:0;width:100%;max-width:360px;box-shadow:var(--sh-lg);animation:slUp .3s cubic-bezier(.34,1.3,.64,1);display:flex;flex-direction:column;max-height:min(560px,80vh)}
.changelog-header{padding:22px 24px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.changelog-icon-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.changelog-logo{width:36px;height:36px;background:var(--brand);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.changelog-title{font-size:17px;font-weight:800;color:var(--t0)}
.changelog-subtitle{font-size:12px;color:var(--t1);margin-top:1px}
.changelog-body{overflow-y:auto;flex:1;padding:8px 0;-webkit-overflow-scrolling:touch}
.changelog-commit{padding:14px 24px;border-bottom:1px solid var(--bd-s)}
.changelog-commit:last-child{border-bottom:none}
.changelog-commit-msg{font-size:14px;font-weight:600;color:var(--t0);line-height:1.45;margin-bottom:4px}
.changelog-commit-body{font-size:12px;color:var(--t1);line-height:1.6;margin-bottom:8px;white-space:pre-wrap}
.changelog-commit-meta{display:flex;align-items:center;gap:8px}
.changelog-sha{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--brand);background:var(--brand-bg);border:1px solid var(--brand-bd);border-radius:4px;padding:1px 6px;font-family:monospace}
.changelog-date{font-size:11px;color:var(--t2)}
.changelog-latest-badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);border-radius:4px;padding:2px 6px}
.changelog-footer{padding:14px 24px;border-top:1px solid var(--bd);flex-shrink:0}
.changelog-hide-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.changelog-checkbox{width:18px;height:18px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
.changelog-hide-label{font-size:13px;color:var(--t1);cursor:pointer;user-select:none;line-height:1.4}
.changelog-close-btn{width:100%;height:44px;background:var(--brand);border:none;color:#fff;font-size:15px;font-weight:700;border-radius:var(--r-md);cursor:pointer;transition:background .15s ease,transform .1s ease}
.changelog-close-btn:hover{background:var(--brand-h)}
.changelog-close-btn:active{transform:scale(.97);transition:transform 0s}
.changelog-loading{padding:40px 24px;text-align:center;color:var(--t2);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:12px}
.changelog-spinner{width:22px;height:22px;border:2px solid var(--bg3);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.changelog-error{padding:28px 24px;text-align:center;color:var(--t1);font-size:13px}

/* ─── RECORD OVERLAY ────────────────────────────────────────────────────────── */
.record-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);animation:bdIn .3s ease}
.record-card{background:var(--bg1);border:1px solid var(--yellow-bd);border-radius:20px;padding:32px 28px;text-align:center;max-width:300px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(210,153,34,.15);animation:slUp .35s cubic-bezier(.34,1.56,.64,1)}
.record-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--yt);margin-bottom:8px}
.record-amount{font-size:44px;font-weight:900;color:var(--t0);font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1}
.record-sub{font-size:13px;color:var(--t1);margin-top:6px}
.record-dismiss{margin-top:24px;background:var(--yellow-bg);border:1px solid var(--yellow-bd);color:var(--yt);font-size:14px;font-weight:700;padding:12px 28px;border-radius:var(--r-md);cursor:pointer;width:100%}

/* Error boundary */
.error-boundary{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.error-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r-lg);padding:26px 22px;width:100%;max-width:360px;text-align:center;box-shadow:var(--sh-lg)}
.error-title{font-size:17px;font-weight:800;color:var(--t0);margin-bottom:6px}
.error-body{font-size:13px;color:var(--t1);line-height:1.6}
.error-actions{display:flex;flex-direction:column;gap:8px;margin-top:18px}
.error-btn{height:44px;border-radius:var(--r-md);font-size:14px;font-weight:700;border:1px solid var(--bd);background:var(--bg2);color:var(--t0);cursor:pointer}
.error-btn:hover{background:var(--bg3)}
.error-btn.danger{background:var(--red);border-color:transparent;color:#fff}
.error-btn.danger:hover{opacity:.9}

/* ─── TUTORIAL ──────────────────────────────────────────────────────────────
   The card no longer remounts on step change — it stays in the DOM and
   transitions position + content using CSS transitions. This eliminates
   the jump and accidental "click through" on blank space.
   ─────────────────────────────────────────────────────────────────────────── */
.tutorial-svg{position:fixed;inset:0;width:100%;height:100%;pointer-events:all}
.tutorial-card{
  position:fixed;left:50%;
  /* bottom is animated via inline style + CSS transition */
  transition:bottom .35s cubic-bezier(.4,0,.2,1);
  transform:translateX(-50%);
  background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r-lg);
  padding:20px;width:min(320px,calc(100vw - 32px));
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(61,107,158,.2);
  z-index:101;pointer-events:all;
  /* Initial entrance animation only */
  animation:tutIn .3s cubic-bezier(.34,1.2,.64,1) both;
}
@keyframes tutIn{from{opacity:0;transform:translateX(-50%) translateY(16px) scale(.97)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
/* Content inside fades on step change */
.tut-content{transition:opacity .18s ease}
.tut-content.fading{opacity:0}
.tut-step-num{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--brand);margin-bottom:6px}
.tut-title{font-size:16px;font-weight:700;color:var(--t0);margin-bottom:6px}
.tut-body{font-size:13px;color:var(--t1);line-height:1.6}
.tut-nav{display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:8px}
.tut-btn{height:36px;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;padding:0 16px;border:1px solid var(--bd)}
.tut-btn.primary{background:var(--brand);color:#fff;border-color:transparent}.tut-btn.primary:hover{background:var(--brand-h)}
.tut-btn.secondary{background:var(--bg2);color:var(--t1)}.tut-btn.secondary:hover{background:var(--bg3)}
.tut-skip{font-size:12px;color:var(--t2);cursor:pointer;background:none;border:none;padding:4px;min-height:36px}
.tut-dots{display:flex;gap:5px;align-items:center}
.tut-dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);transition:all .25s cubic-bezier(.34,1.4,.64,1)}
.tut-dot.active{background:var(--brand);width:20px;border-radius:3px}

/* ─── MISC ──────────────────────────────────────────────────────────────────── */
/* Footer is taller now (full-width calc button adds ~62px) */
.main-content{max-width:480px;margin:0 auto;padding:14px 14px 280px}
.section-body{padding:8px;display:flex;flex-direction:column;gap:4px}
.hold-hint{text-align:center;font-size:11px;color:var(--t2);padding-bottom:4px;letter-spacing:.3px}
.toast{
  position:fixed;left:50%;
  bottom:calc(210px + env(safe-area-inset-bottom));
  transform:translateX(-50%);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  border:1px solid var(--bd);
  border-radius:999px;padding:9px 18px;
  font-size:13px;font-weight:700;color:var(--t0);
  text-align:center;white-space:nowrap;
  box-shadow:0 10px 24px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.05);
  backdrop-filter:blur(6px);
  z-index:60;animation:toastIn .18s ease;
}
.toast.success{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.toast.error{background:rgba(248,81,73,.12);border-color:rgba(248,81,73,.35);color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
.bump{animation:bump .18s ease-out}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.35);opacity:1}}
@keyframes flagFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes spotGlow{0%,100%{opacity:.7}50%{opacity:1}}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999}

/* ─── SHARE / COPY REPORT BUTTON ────────────────────────────────────────────── */
.share-btn{
  width:100%;height:50px;
  background:var(--bg2);border:1px solid var(--bd);
  color:var(--t1);font-size:15px;font-weight:600;
  border-radius:var(--r-md);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background-color .15s ease,color .15s ease,border-color .15s ease,transform .1s ease;
}
.share-btn:hover{background:var(--bg3);color:var(--t0)}
.share-btn:active{transform:scale(.98);transition:transform 0s}
.share-btn.copied{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}

@media(max-width:380px){
  .gh-header-title{font-size:14px}.denom-label{width:36px;font-size:13px}
  .denom-input{font-size:16px;height:40px}
  /* step-btn shrinks visually but keeps the 48px hit-area via ::after */
  .step-btn{width:40px;height:44px}
  .roll-btn{min-width:38px;height:44px}.footer-total-value{font-size:26px}
  .icon-btn{width:36px;height:36px}
  .gh-header-actions{gap:4px}.btn-calc{height:48px;font-size:15px}
  .history-trends{grid-template-columns:1fr}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
    scroll-behavior:auto !important;
  }
  .tutorial-svg{display:none}
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="root"></div>

<script>
(function(){
  try{
    const key='ac_theme';
    const stored=JSON.parse(localStorage.getItem(key));
    const theme=(stored==='dark'||stored==='light')
      ? stored
      : (window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
    document.documentElement.setAttribute('data-theme',theme);
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute('content',theme==='dark'?'#0d1117':'#ffffff');
  }catch{}
})();
</script>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef,memo}=React;
let sparkSeq=0;

const Icon=memo(({path,size=16,...p})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
    <path d={path}/>
  </svg>

function applyTheme(theme){
  const html=document.documentElement;
  // 1. Add transition class
  html.classList.add('thm');
  // 2. Force a style recalc so the browser registers the transition rules
  //    before we change the attribute (getComputedStyle flushes pending styles)
  // eslint-disable-next-line no-unused-expressions
  getComputedStyle(html).backgroundColor;
  // 3. Swap theme — now the transitions will animate from old → new values
  html.setAttribute('data-theme',theme);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content',theme==='dark'?'#0d1117':'#ffffff');
}

const REDUCE_MOTION=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const toCents=n=>Math.round(n*100);
const fromCents=c=>c/100;
const formatMoney=v=>`$${v.toFixed(2)}`;

function rowValue(raw,denom,mode){
  const n=Number(raw)||0;
  if(mode==='count') return fromCents(Math.floor(n)*toCents(denom));
  return fromCents(Math.floor(toCents(n)/toCents(denom))*toCents(denom));
}
function rowCount(raw,denom,mode){
  const n=Number(raw)||0;
  return mode==='count'?Math.floor(n):Math.floor(toCents(n)/toCents(denom));
}
function rowSubtotal(raw,denom,mode){
  const n=Number(raw)||0;
  if(!n) return null;
  if(mode==='count'){const v=Math.floor(n)*denom;return v?`=$${v.toFixed(2)}`:null;}
  const c=Math.floor(toCents(n)/toCents(denom));
  return c?`=${c}×`:null;
}
function convertCash(cash,from,to,denoms){
  if(from===to) return cash;
  const next={...cash};
  for(const{id,val}of denoms){
    const raw=Number(cash[id])||0;if(!raw) continue;
    if(from==='count'){const c=Math.floor(raw)*toCents(val);next[id]=c?fromCents(c).toString():'';}
    else{const c=Math.floor(toCents(raw)/toCents(val));next[id]=c?String(c):'';}
  }
  return next;
}
function computeMinKeep(t){
  return{100:0,50:0,20:Math.max(2,Math.ceil(t*.12/20)),10:Math.max(2,Math.ceil(t*.08/10)),5:Math.max(3,Math.ceil(t*.06/5)),1:Math.max(5,Math.ceil(t*.03/1))};
}
function computeDrop(cash,bm,da,target){
  if(da<=0) return[];
  const tc=toCents(da),RANK={100:1,50:2,20:3,10:4,5:5,1:6};
  const avail={};for(const d of BILL_DENOMS)avail[d]=rowCount(cash[String(d)],d,bm);
  const mk=computeMinKeep(target);
  const mp={};for(const d of BILL_DENOMS)mp[d]=Math.max(0,avail[d]-mk[d]);
  const costs={};
  for(const d of BILL_DENOMS){
    const s=avail[d]-mk[d];
    const bc=s<=0?500+RANK[d]*50:RANK[d]*5-Math.min(Math.log1p(s/Math.max(mk[d],1)),2);
    costs[d]=Math.max(1,Math.round(bc*1e5));
  }
  if(tc>1e6) return greedyDrop(avail,mp,tc);
  const INF=2e9,dp=new Int32Array(tc+1).fill(INF),ch=new Int16Array(tc+1).fill(-1);
  dp[0]=0;
  for(const d of BILL_DENOMS){
    const dc=toCents(d),cnt=mp[d];if(!cnt||!dc) continue;
    const c=costs[d];
    for(let k=0;k<cnt;k++) for(let a=tc;a>=dc;a--){const ca=dp[a-dc]+c;if(ca<dp[a]){dp[a]=ca;ch[a]=d;}}
  }
  let best=0;for(let a=tc;a>=0;a--)if(dp[a]<INF){best=a;break;}
  if(best===0) return greedyDrop(avail,mp,tc);
  const bills={};let rem=best;
  while(rem>0){const d=ch[rem];if(d===-1)break;bills[d]=(bills[d]||0)+1;rem-=toCents(d);}
  return BILL_DENOMS.filter(d=>bills[d]>0).map(d=>({label:`$${d}`,count:bills[d],value:bills[d]*d,denom:d}));
}
function greedyDrop(avail,mp,tc){
  const RANK={100:1,50:2,20:3,10:4,5:5,1:6};
  const order=[...BILL_DENOMS].sort((a,b)=>{
    const sa=mp[a],sb=mp[b];if(sa>0&&sb<=0)return-1;if(sb>0&&sa<=0)return 1;return RANK[a]-RANK[b];
  });
  let rem=tc;const out=[];
  for(const d of order){const dc=toCents(d),take=Math.min(mp[d],Math.floor(rem/dc));if(take>0){out.push({label:`$${d}`,count:take,value:take*d,denom:d});rem-=take*dc;}}
  return out.sort((a,b)=>b.denom-a.denom);
}

function launchConfetti(){
  if(REDUCE_MOTION) return;
  const canvas=document.getElementById('confetti-canvas');if(!canvas)return;
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const COLS=['#3fb950','#58a6ff','#e3b341','#f78166','#bc8cff','#ffa657'];
  const ps=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-10-Math.random()*200,vx:(Math.random()-.5)*6,vy:3+Math.random()*4,color:COLS[Math.random()*6|0],w:6+Math.random()*6,h:10+Math.random()*6,rot:Math.random()*360,rv:(Math.random()-.5)*8,alpha:1}));
  let raf;
  const tick=()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);let alive=0;
    for(const p of ps){p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.rot+=p.rv;p.alpha-=.008;if(p.y<canvas.height&&p.alpha>0){alive++;ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}}
    if(alive>0)raf=requestAnimationFrame(tick);else ctx.clearRect(0,0,canvas.width,canvas.height);
  };
  tick();setTimeout(()=>{cancelAnimationFrame(raf);ctx.clearRect(0,0,canvas.width,canvas.height);},5000);
}

// ── Sheet close animation hook ──────────────────────────────────────────────────
// Returns [isClosing, triggerClose]
// triggerClose() plays the exit animation then calls onClose
function useSheetClose(onClose,duration=260){
  const [closing,setClosing]=useState(false);
  const tmRef=useRef(null);
  const triggerClose=useCallback(()=>{
    setClosing(true);
    clearTimeout(tmRef.current);
    tmRef.current=setTimeout(()=>{setClosing(false);onClose();},duration);
  },[onClose,duration]);
  useEffect(()=>()=>clearTimeout(tmRef.current),[]);
  return[closing,triggerClose];
}

// ── Sheet drag-to-dismiss ───────────────────────────────────────────────────────
// React synthetic onTouchMove is passive by default in React 17+ — calling
// e.preventDefault() on it is silently ignored, so the page ALSO scrolls.
// Fix: attach touchmove imperatively with {passive:false} so preventDefault
// actually blocks the browser scroll. Use translate3d + will-change so the
// GPU composites the drag instead of the main thread painting it.
function useSheetDismiss(triggerClose){
  const ref=useRef(null);
  const startY=useRef(null);
  const dragging=useRef(false);
  const scrollTop=useRef(0); // track sheet-body scroll position

  useEffect(()=>{
    const el=ref.current;
    if(!el) return;

    // promote to its own compositor layer immediately
    el.style.willChange='transform';

    const onStart=e=>{
      // Query sheet-body fresh each time (it renders after mount)
      const bodyEl=el.querySelector('.sheet-body');
      scrollTop.current=bodyEl?bodyEl.scrollTop:0;
      startY.current=e.touches[0].clientY;
      dragging.current=false;
    };

    const onMove=e=>{
      if(startY.current===null) return;
      const dy=e.touches[0].clientY-startY.current;
      const bodyEl=el.querySelector('.sheet-body');
      scrollTop.current=bodyEl?bodyEl.scrollTop:0;
      // Only hijack if: dragging downward AND sheet-body is scrolled to top
      if(dy>4&&scrollTop.current<=0){
        dragging.current=true;
        e.preventDefault(); // works because {passive:false}
        el.style.transform=`translate3d(0,${Math.max(0,dy)}px,0)`;
      }
    };

    const onEnd=e=>{
      if(startY.current===null) return;
      const dy=e.changedTouches[0].clientY-startY.current;
      el.style.transform='';
      if(dragging.current&&dy>80){haptic([6]);triggerClose();}
      startY.current=null;
      dragging.current=false;
    };

    el.addEventListener('touchstart',onStart,{passive:true});
    el.addEventListener('touchmove', onMove, {passive:false}); // ← key fix
    el.addEventListener('touchend',  onEnd,  {passive:true});
    el.addEventListener('touchcancel',onEnd,{passive:true});

    return()=>{
      el.removeEventListener('touchstart',onStart);
      el.removeEventListener('touchmove', onMove);
      el.removeEventListener('touchend',  onEnd);
      el.removeEventListener('touchcancel',onEnd);
      el.style.willChange='';
    };
  // Re-attach if triggerClose identity changes (it's stable via useCallback, but be safe)
  },[triggerClose]);

  return{ref};
}

// ── Hold-to-repeat ──────────────────────────────────────────────────────────────
function useHoldRepeat(cb){
  const tmRef=useRef(null);
  const [rpt,setRpt]=useState(false);
  const start=useCallback(()=>{
    cb();
    let delay=380;
    const loop=()=>{cb();haptic([3]);delay=Math.max(55,delay*.72);tmRef.current=setTimeout(loop,delay);};
    tmRef.current=setTimeout(()=>{setRpt(true);loop();},380);
  },[cb]);
  const stop=useCallback(()=>{clearTimeout(tmRef.current);setRpt(false);},[]);
  useEffect(()=>()=>clearTimeout(tmRef.current),[]);
  return{repeating:rpt,start,stop};
}

function useToast(){
  const [toast,setToast]=useState(null);
  const tmRef=useRef(null);
  const show=useCallback((message,type='neutral',duration=1800)=>{
    clearTimeout(tmRef.current);
    setToast({message,type});
    tmRef.current=setTimeout(()=>setToast(null),duration);
  },[]);
  useEffect(()=>()=>clearTimeout(tmRef.current),[]);
  return{toast,show};
}

// ── Collapsible section ─────────────────────────────────────────────────────────
function CollapsibleSection({id,label,badge,mode,onModeChange,children,defaultOpen=true}){
  const [open,setOpen]=useState(defaultOpen);
  const [pressing,setPressing]=useState(false);
  const innerRef=useRef(null);
  const [ht,setHt]=useState('none');

  useEffect(()=>{
    const el=innerRef.current;
    if(!el) return;
    const ro=new ResizeObserver(()=>setHt(el.scrollHeight));
    ro.observe(el);
    setHt(el.scrollHeight);
    return()=>ro.disconnect();
  },[]);

  const onPointerDown=e=>{
    // Only show pressed state when touching the header background itself,
    // not any interactive child (buttons inside mode toggle, etc.)
    if(!e.target.closest('button,input,a,[role="button"]')){
      setPressing(true);
    }
  };
  const clearPress=()=>setPressing(false);
  const onDivClick=e=>{
    // Ignore clicks that originated from child interactive elements
    if(e.target.closest('button,input,a')||e.target.closest('.mode-toggle-wrap')) return;
    haptic([4]);
    setOpen(v=>!v);
  };

  return(
    <div className="gh-card" id={id}>
      <div
        role="button" tabIndex={0}
        className={`section-toggle-btn${pressing?' pressing':''}`}
        onPointerDown={onPointerDown}
        onPointerUp={clearPress}
        onPointerLeave={clearPress}
        onPointerCancel={clearPress}
        onClick={onDivClick}
        onKeyDown={e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();haptic([4]);setOpen(v=>!v);}}}
      >
        <div className="section-toggle-left">
          <span className="section-label">{label}</span>
          <span className="badge">{badge}</span>
        </div>
        <div className="section-toggle-right">
          <ModeToggle mode={mode} onChange={onModeChange}/>
          <Icon path={PATH.chevD} size={16} className={`sec-chev${open?' open':''}`}/>
        </div>
      </div>
      <div ref={innerRef} className={`section-body-wrap${open?'':' closed'}`}
        style={{maxHeight:open?`${ht}px`:'0'}}>
        {children}
      </div>
    </div>
  );
}

// ── BillRow ─────────────────────────────────────────────────────────────────────
const BillRow=memo(({id,label,denom,rollCount,inputMode,value,onManualInput,onStep,onClear,showHint,onHintDismiss})=>{
  const has=Number(value)>0;
  const sub=rowSubtotal(value,denom,inputMode);
  const hasRoll=Number.isFinite(rollCount)&&rollCount>0;
  const rollLabel=hasRoll?`$${(rollCount*denom).toFixed(2)}`:'';
  const plusCb=useCallback(()=>onStep(id,1,denom),[id,denom,onStep]);
  const minusCb=useCallback(()=>onStep(id,-1,denom),[id,denom,onStep]);
  const plus=useHoldRepeat(plusCb);
  const minus=useHoldRepeat(minusCb);
  return(
    <div className={`denom-row${has?' has-value':''}`}>
      <span className={`denom-label${has?' active':''}`}>{label}</span>
      <div className="denom-input-wrap">
        {inputMode==='value'&&<span className="denom-prefix">$</span>}
        <input type="number" min="0" step={inputMode==='count'?1:'any'} inputMode={inputMode==='count'?'numeric':'decimal'}
          className={`denom-input${inputMode==='value'?' has-prefix':''}`}
          value={value} placeholder="0"
          onChange={e=>{onManualInput(id,e.target.value,inputMode);if(showHint)onHintDismiss();}}
          onFocus={e=>{e.target.select();if(showHint)onHintDismiss();}}
          onWheel={e=>e.target.blur()}/>
        {sub&&!showHint&&<span className="row-sub-inline">{sub}</span>}
        {showHint&&<span className="tap-hint"><Icon path={PATH.pencil} size={9}/> tap to type</span>}
      </div>
      <div className="stepper">
        {hasRoll&&(
          <button onPointerDown={()=>haptic([6,30,10])} onClick={()=>onStep(id,rollCount,denom)}
            className="roll-btn" title={`Add 1 roll (${rollLabel})`} aria-label={`Add 1 roll (${rollLabel})`}>
            <div className="roll-btn-icons"><Icon path={PATH.plus} size={11}/><Icon path={PATH.coin} size={14}/></div>
            <span className="roll-btn-label">{rollLabel}</span>
          </button>
        )}
        <button className={`step-btn${minus.repeating?' repeating':''}`}
          onPointerDown={e=>{e.preventDefault();haptic([5]);minus.start();}}
          onPointerUp={minus.stop} onPointerLeave={minus.stop} onPointerCancel={minus.stop} aria-label={`Decrease ${label}`}>
          <Icon path={PATH.minus} size={16}/>
        </button>
        <button className={`step-btn plus${has?' active':''}${plus.repeating?' repeating':''}`}
          onPointerDown={e=>{e.preventDefault();haptic([7]);plus.start();}}

function buildReport({totalCash,actualDropTotal,remainingDrawer,TARGET,dropDetails,billsMode,cash,coinsMode}){

  lines.push('─'.repeat(28));

function ShareButton({report}){
  const [state,setState]=useState('idle'); // idle | copied | shared
  const canShare=typeof navigator.share==='function';

  const handleShare=async()=>{
    haptic([8]);
    if(canShare){
      try{
        await navigator.share({title:'Drop Report',text:report});
        setState('shared');setTimeout(()=>setState('idle'),2000);
      }catch(e){
        // User cancelled or share failed — fall back to copy
        if(e.name!=='AbortError') doCopy();
      }
    } else {
      doCopy();
    }
  };

  const doCopy=()=>{
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(report)
        .then(()=>{setState('copied');setTimeout(()=>setState('idle'),2000);})
        .catch(()=>legacyCopy());
    } else {
      legacyCopy();
    }
  };

  const legacyCopy=()=>{
    try{
      const ta=document.createElement('textarea');
      ta.value=report;
      Object.assign(ta.style,{position:'fixed',top:'0',left:'0',opacity:'0',pointerEvents:'none'});
      document.body.appendChild(ta);ta.focus();ta.select();
      const ok=document.execCommand('copy');
      document.body.removeChild(ta);
      setState(ok?'copied':'idle');
      if(ok)setTimeout(()=>setState('idle'),2000);
    }catch{setState('idle');}
  };

  const label=state==='copied'?'Copied!'
    :state==='shared'?'Shared!'
    :canShare?'Share Report':'Copy Report';
  const iconPath=state==='copied'||state==='shared'?PATH.check
    :canShare?PATH.share:PATH.copy;

  return(
    <button className={`share-btn${state!=='idle'?' copied':''}`} onClick={handleShare}>
      <Icon path={iconPath} size={18}/>
      {label}
    </button>
  );
}

function AnimatedTotal({value,className}){

  const prev=useRef(value),tm=useRef(null);
  useEffect(()=>{

    if(value!==prev.current){prev.current=value;setBump(true);clearTimeout(tm.current);tm.current=setTimeout(()=>setBump(false),200);}
    return()=>clearTimeout(tm.current);
  },[value]);
  return<div className={`${className}${bump?' bump':''}`}>{value}</div>;
}

function Toast({toast}){
  if(!toast) return null;

function CountUp({value,format,className,duration=1500,startFrom=0}){
  const [display,setDisplay]=useState(startFrom);
  const fromRef=useRef(startFrom);
  const rafRef=useRef(null);
  useEffect(()=>{
    if(REDUCE_MOTION){fromRef.current=value;setDisplay(value);return;}
    const from=fromRef.current;
    const to=value;
    if(from===to){setDisplay(to);return;}
    const start=performance.now();
    const ease=t=>1-Math.pow(1-t,3);
    const tick=now=>{
      const t=Math.min(1,(now-start)/duration);
      const eased=ease(t);
      setDisplay(from+(to-from)*eased);
      if(t<1) rafRef.current=requestAnimationFrame(tick);
      else fromRef.current=to;
    };
    cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafRef.current);
  },[value,duration]);
  const out=format?format(display):display;
  return <span className={className}>{out}</span>;
}

function ProgressBar({over,target,totalCash,recordDrop,gamification}){
  const beatAt=recordDrop>0?target+recordDrop:0;
  const barMax=Math.max(totalCash,beatAt>0?beatAt*1.08:0,target||1);
  const filledPct=Math.min(100,(totalCash/barMax)*100);
  const rawFlagPct=gamification&&recordDrop>0?(beatAt/barMax)*100:null;
  const beatLabel=`$${beatAt.toFixed(2)}`;
  const wrapRef=useRef(null);
  // Clamp so the pill never bleeds off either edge
  const [clampedPct,setClampedPct]=useState(rawFlagPct??50);
  useEffect(()=>{
    if(rawFlagPct==null) return;
    const el=wrapRef.current;
    if(!el) return;
    const W=el.offsetWidth;
    // Pill is ~80px wide max; keep its centre at least 40px from each edge
    const TAG_HALF=40;
    const minPct=(TAG_HALF/W)*100;
    const maxPct=((W-TAG_HALF)/W)*100;
    setClampedPct(Math.min(maxPct,Math.max(minPct,rawFlagPct)));
  },[rawFlagPct]);
  return(
    <div className="progress-wrap">
      <div className="progress-track">
        <div className={`progress-fill${over?' over':''}`} style={{width:`${filledPct}%`}}/>
      </div>
      {rawFlagPct!=null&&(
        <div className="progress-flag-wrap" ref={wrapRef}>
          <div className="progress-flag" style={{left:`${clampedPct}%`}}>
            <div className="progress-flag-pole"/>
            <div className="progress-flag-tag">Best at {beatLabel}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Tutorial ─────────────────────────────────────────────────────────────────────
// Card stays mounted; position slides via CSS transition on `bottom`.
// Content fades out → updates → fades in on each step, so "Next" never
// moves the card while content is visible (no blank-click problem).
const TUT_STEPS=[
  {title:'Welcome to Apple-Counter!',body:"Count your drawer and calculate exactly what to drop. Quick tour — or skip anytime.",target:null},
  {title:'Enter Bill Counts',body:'Tap the input box to type a number directly, or use + / − buttons. Hold + or − to count fast!',target:'bills-card'},
  {title:'Enter Coins Too',body:'Tap the Coins header to expand. The blue roll button adds a whole roll at once!',target:'coins-card'},
  {title:'Watch the Progress Bar',body:'The bar fills as you count. It turns green when you hit target. A flag shows your record drop.',target:'progress-bar'},
  {title:'Calculate Your Drop',body:'Tap Calculate to see exactly which bills to pull. Your drop is auto-saved to history.',target:'calc-btn'},
  {title:'Your Header Buttons',body:'Sun/Moon = Dark Mode. Clock = Drop History. Gear = Settings. Refresh = Clear all counts.',target:'header-actions'},
  {title:"You're all set!",body:"Have a great shift! Tap Settings → Replay to see this tour again anytime.",target:null},
];
const SPAD=10;

function Tutorial({onDone}){
  const [step,setStep]=useState(0);
  const [spot,setSpot]=useState(null);
  const [bot,setBot]=useState(120);
  // Displayed content — updated after the fade-out completes
  const [disp,setDisp]=useState({step:0,s:TUT_STEPS[0]});
  const [fading,setFading]=useState(false);
  const tmRef=useRef(null);
  const botTmRef=useRef(null);

  // When step changes: fade out content, reposition card, fade content back in
  useEffect(()=>{
    const s=TUT_STEPS[step];
    // 1. Fade out content
    setFading(true);
    // 2. After fade-out (180ms), scroll target into view and compute new bottom
    tmRef.current=setTimeout(()=>{
      setDisp({step,s});  // update text while invisible
      if(!s.target){
        setSpot(null);
        window.scrollTo({top:0,behavior:'smooth'});
        setBot(120);
        setFading(false);
        return;
      }
      const el=document.getElementById(s.target);
      if(!el){setSpot(null);setFading(false);return;}
      el.scrollIntoView({behavior:'smooth',block:'center'});
      // 3. After scroll settles, measure and update position, then fade in
      botTmRef.current=setTimeout(()=>{
        const r=el.getBoundingClientRect(),p=SPAD;
        setSpot({x:r.left-p,y:r.top-p,w:r.width+p*2,h:r.height+p*2,rx:10});
        const vh=window.innerHeight,mid=r.top+r.height/2;
        setBot(mid>vh*.45?Math.min(Math.max(110,vh-r.top+p+16),vh-240):80);
        setFading(false);  // fade content back in
      },380);
    },180);

    return()=>{clearTimeout(tmRef.current);clearTimeout(botTmRef.current);};
  },[step]);

  const next=()=>{haptic([5]);if(step<TUT_STEPS.length-1)setStep(s=>s+1);else onDone();};
  const W=window.innerWidth,H=window.innerHeight;
  const svgHtml=spot
    ?`<defs><mask id="tm"><rect width="${W}" height="${H}" fill="white"/><rect x="${spot.x}" y="${spot.y}" width="${spot.w}" height="${spot.h}" rx="${spot.rx}" fill="black"/></mask><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="${W}" height="${H}" fill="rgba(0,0,0,0.78)" mask="url(#tm)"/><rect x="${spot.x}" y="${spot.y}" width="${spot.w}" height="${spot.h}" rx="${spot.rx}" fill="none" stroke="rgba(61,107,158,0.95)" stroke-width="2.5" filter="url(#glow)" style="animation:spotGlow 2s ease-in-out infinite"/>`
    :`<rect width="${W}" height="${H}" fill="rgba(0,0,0,0.78)"/>`;

  return(
    <div style={{position:'fixed',inset:0,zIndex:100,pointerEvents:'none'}}>
      <svg className="tutorial-svg" dangerouslySetInnerHTML={{__html:svgHtml}}/>
      {/* Single persistent card — position transitions via CSS */}
      <div className="tutorial-card" style={{bottom:`${bot}px`,pointerEvents:'all'}}>
        <div className={`tut-content${fading?' fading':''}`}>
          <div className="tut-step-num">Step {disp.step+1} of {TUT_STEPS.length}</div>
          <div className="tut-title">{disp.s.title}</div>
          <div className="tut-body">{disp.s.body}</div>
          <div className="tut-nav">
            <button className="tut-skip" onClick={()=>{haptic([4]);onDone();}}>Skip</button>
            <div className="tut-dots">
              {TUT_STEPS.map((_,i)=><div key={i} className={`tut-dot${i===disp.step?' active':''}`}/>)}
            </div>
            <button className="tut-btn primary" onClick={next} disabled={fading}>
              {disp.step===TUT_STEPS.length-1?'Done':'Next'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Animated sheet wrapper ───────────────────────────────────────────────────────
function AnimatedSheet({onClose,children,scrollable=false}){
  const [closing,triggerClose]=useSheetClose(onClose);
  const drag=useSheetDismiss(triggerClose);

  useEffect(()=>{
    const body=document.body;
    const prevOverflow=body.style.overflow;
    const prevPadding=body.style.paddingRight;
    body.style.overflow='hidden';
    return()=>{body.style.overflow=prevOverflow;body.style.paddingRight=prevPadding;};
  },[]);

  const handleBackdropClick=e=>{
    if(e.target===e.currentTarget){haptic([6]);triggerClose();}
  };

  return(
    <div className={`sheet-backdrop${closing?' closing':''}`} onClick={handleBackdropClick}>
      <div
        className={`sheet${scrollable?' scrollable':''}`}
        ref={drag.ref}
        // No React touch handlers — useSheetDismiss attaches them imperatively
        // with {passive:false} so preventDefault actually works
      >
        {children(triggerClose)}
      </div>
    </div>
  );
}

function Sparkline({data,stroke=['var(--brand)','var(--green)'],fill=['rgba(88,166,255,.18)','rgba(88,166,255,0)']}){
  if(!data||data.length<2) return null;
  const idRef=useRef(++sparkSeq);
  const strokeId=`spark-stroke-${idRef.current}`;
  const fillId=`spark-fill-${idRef.current}`;
  const glowId=`spark-glow-${idRef.current}`;
  const clipId=`spark-clip-${idRef.current}`;
  const W=200,H=56,PAD=4;
  const min=Math.min(...data);
  const max=Math.max(...data);
  const range=max-min||1;
  const pts=data.map((d,i)=>{
    const x=PAD+(i/(data.length-1))*(W-PAD*2);
    const y=PAD+((1-(d-min)/range))*(H-PAD*2);
    return[x,y];
  });
  // Build smooth cubic bezier path
  const buildPath=ps=>{
    if(ps.length<2) return '';
    let d=`M${ps[0][0]},${ps[0][1]}`;
    for(let i=1;i<ps.length;i++){
      const[x0,y0]=ps[i-1],[x1,y1]=ps[i];
      const cx=(x0+x1)/2;
      d+=` C${cx},${y0} ${cx},${y1} ${x1},${y1}`;
    }
    return d;
  };
  const linePath=buildPath(pts);
  const last=pts[pts.length-1];
  const fillPath=`${linePath} L${last[0]},${H} L${pts[0][0]},${H} Z`;
  return(
    <svg className="sparkline" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{color:stroke[1],overflow:'visible'}}>
      <defs>
        <linearGradient id={strokeId} x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
          <stop offset="0%" stopColor={stroke[0]}/>
          <stop offset="100%" stopColor={stroke[1]}/>
        </linearGradient>
        <linearGradient id={fillId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={fill[0]}/>
          <stop offset="100%" stopColor={fill[1]}/>
        </linearGradient>
        <filter id={glowId} x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="1.8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id={clipId}><rect x="0" y="0" width={W} height={H}/></clipPath>
      </defs>
      <g clipPath={`url(#${clipId})`}>
        <path d={fillPath} fill={`url(#${fillId})`} stroke="none"/>
        <path d={linePath} fill="none" stroke={`url(#${strokeId})`} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </g>
      <circle cx={last[0]} cy={last[1]} r="3.2" fill={stroke[1]} filter={`url(#${glowId})`} className="sparkline-dot"/>
    </svg>
  );
}
