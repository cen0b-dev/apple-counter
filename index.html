<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apple-Counter">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233d6b9e'/><text y='.9em' font-size='70' x='50%' text-anchor='middle' font-family='sans-serif' font-weight='900' fill='white'>AC</text></svg>">
<title>Apple-Counter Drop</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --brand:#3d6b9e;--brand-hover:#4a7ab5;--brand-bg:rgba(61,107,158,.08);--brand-border:rgba(61,107,158,.2);
  --bg-primary:#0d1117;--bg-secondary:#161b22;--bg-tertiary:#21262d;--bg-overlay:#30363d;
  --border-color:#30363d;--border-subtle:#21262d;
  --text-primary:#f0f6fc;--text-secondary:#8b949e;--text-muted:#484f58;--text-link:#58a6ff;
  --green:#3fb950;--green-muted:rgba(63,185,80,.15);--green-border:rgba(63,185,80,.3);--green-text:#3fb950;
  --yellow:#d29922;--yellow-muted:rgba(187,128,9,.15);--yellow-border:rgba(187,128,9,.3);--yellow-text:#e3b341;
  --danger:#f85149;
  --shadow-sm:0 0 0 1px rgba(240,246,252,.1);--shadow-md:0 3px 6px rgba(0,0,0,.4);--shadow-lg:0 8px 24px rgba(0,0,0,.5);
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans',Helvetica,Arial,sans-serif;
}
html[data-theme="light"]{
  --bg-primary:#fff;--bg-secondary:#f6f8fa;--bg-tertiary:#eaeef2;--bg-overlay:#d0d7de;
  --border-color:#d0d7de;--border-subtle:#eaeef2;
  --text-primary:#1f2328;--text-secondary:#656d76;--text-muted:#9198a1;
  --brand:#0550ae;--brand-hover:#0440a0;--brand-bg:rgba(5,80,174,.06);--brand-border:rgba(5,80,174,.15);--text-link:#0550ae;
  --green:#1a7f37;--green-muted:rgba(26,127,55,.1);--green-border:rgba(26,127,55,.25);--green-text:#1a7f37;
  --yellow-text:#9a6700;--yellow-muted:rgba(154,103,0,.1);--yellow-border:rgba(154,103,0,.25);
  --shadow-sm:0 1px 3px rgba(31,35,40,.12);--shadow-md:0 3px 6px rgba(31,35,40,.15);--shadow-lg:0 8px 24px rgba(31,35,40,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type="number"]{-moz-appearance:textfield}
body,*{-ms-overflow-style:none;scrollbar-width:none}
::-webkit-scrollbar{display:none}
body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent;transition:background .25s,color .25s;min-height:100vh}
button,input{-webkit-tap-highlight-color:transparent}
button:focus,input:focus{outline:none}
:focus-visible{outline:none}
svg{display:inline-block;vertical-align:middle}

/* Header */
.gh-header{background:var(--bg-secondary);border-bottom:1px solid var(--border-color);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
.gh-header-brand{display:flex;align-items:center;gap:12px}
.gh-logo{width:36px;height:36px;background:var(--brand);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;letter-spacing:-.5px}
.gh-header-title{font-size:17px;font-weight:700;color:var(--text-primary)}
.gh-header-sub{font-size:11px;color:var(--text-secondary);letter-spacing:.5px;text-transform:uppercase}
.gh-header-actions{display:flex;gap:10px}

/* Buttons */
.theme-toggle,.gh-btn-icon{width:44px;height:44px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);transition:all .15s;font-size:0}
.theme-toggle:hover,.gh-btn-icon:hover{background:var(--bg-overlay);color:var(--text-primary)}
.theme-toggle:active,.gh-btn-icon:active{transform:scale(.93)}
.gh-btn-primary{background:#238636;border:1px solid rgba(63,185,80,.4);color:#fff;font-size:16px;font-weight:600;padding:0 22px;height:50px;border-radius:var(--radius-md);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;white-space:nowrap}
.gh-btn-primary:hover{background:#2ea043;box-shadow:0 0 0 3px rgba(35,134,54,.3)}
.gh-btn-primary:active{transform:scale(.97)}
html[data-theme="light"] .gh-btn-primary{background:#1f883d;border-color:rgba(31,136,61,.4)}
html[data-theme="light"] .gh-btn-primary:hover{background:#1a7f37;box-shadow:0 0 0 3px rgba(31,136,61,.25)}

/* Card */
.gh-card{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-lg);overflow:hidden}
.gh-card-header{background:var(--bg-tertiary);border-bottom:1px solid var(--border-color);padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
.gh-section-label{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-secondary)}
.gh-badge{font-size:13px;font-weight:700;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:20px;padding:3px 10px;color:var(--text-secondary);font-variant-numeric:tabular-nums}

/* Mode toggle */
.mode-toggle{display:flex;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:3px}
.mode-btn{padding:6px 14px;font-size:12px;font-weight:700;border-radius:5px;cursor:pointer;transition:all .15s;color:var(--text-secondary);border:none;background:transparent;min-height:32px}
.mode-btn.active{background:var(--bg-tertiary);color:var(--text-primary);box-shadow:var(--shadow-sm)}

/* Rows */
.denom-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-md);transition:background .1s;min-height:58px}
.denom-row.has-value{background:var(--green-muted);outline:1px solid var(--green-border)}
.denom-row:not(.has-value):hover{background:var(--bg-tertiary)}
.denom-label-bill{width:44px;text-align:center;font-size:15px;font-weight:800;color:var(--text-secondary);flex-shrink:0}
.denom-label-bill.active{color:var(--green-text)}
.denom-label-coin{width:42px;height:42px;flex-shrink:0;border-radius:50%;background:var(--bg-tertiary);border:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--text-secondary);transition:all .15s}
.denom-label-coin.active{background:var(--green-muted);border-color:var(--green-border);color:var(--green-text)}
.denom-input-wrap{position:relative;flex:1;min-width:0}
.denom-prefix{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;font-weight:600;color:var(--text-muted);pointer-events:none;user-select:none}
.denom-input{width:100%;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-sm);height:44px;padding:0 52px 0 12px;font-size:17px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums;transition:border .15s,background .15s}
.denom-input.has-prefix{padding-left:28px}
.denom-input:focus{border-color:var(--bg-overlay);background:var(--bg-secondary)}
.denom-input::placeholder{color:var(--text-muted);font-weight:400}
.row-sub{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:600;color:var(--text-muted);pointer-events:none;user-select:none;font-variant-numeric:tabular-nums;letter-spacing:.2px}

/* Steppers */
.stepper{display:flex;gap:6px;flex-shrink:0}
.step-btn{width:44px;height:44px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);transition:all .1s}
.step-btn:hover{background:var(--bg-overlay);color:var(--text-primary)}
.step-btn:active{transform:scale(.9)}
.step-btn.plus.active{border-color:var(--green-border);color:var(--green-text)}
.roll-btn{height:44px;min-width:54px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--brand);transition:all .1s;padding:0 8px}
.roll-btn:hover{background:var(--brand-bg);border-color:var(--brand-border)}
.roll-btn:active{transform:scale(.93)}
.roll-btn-icons{display:flex;align-items:center;gap:2px}
.roll-btn-label{font-size:9px;font-weight:800;opacity:.75;letter-spacing:.3px}

/* Footer */
.sticky-footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);border-top:1px solid var(--border-color);padding:14px 18px 28px;z-index:20;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
html[data-theme="light"] .sticky-footer{box-shadow:0 -4px 20px rgba(31,35,40,.12)}
.footer-row{display:flex;align-items:center;gap:14px}
.footer-total-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text-secondary);margin-bottom:2px}
.footer-total-value{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text-primary);line-height:1.1;transition:color .2s}
.footer-total-value.over{color:var(--green-text)}
.target-row{margin-top:12px}
.target-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.target-label-group{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-secondary)}
.target-input{width:72px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:4px 8px;text-align:center;font-size:14px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums;height:34px}
.target-input:focus{border-color:var(--bg-overlay);background:var(--bg-secondary)}
.target-status{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;font-variant-numeric:tabular-nums}
.target-status.over{color:var(--green-text)}
.target-status.under{color:var(--text-muted)}

/* Progress bar — animated fill */
.progress-track{height:6px;background:var(--bg-overlay);border-radius:99px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1),background .3s;background:var(--brand)}
.progress-fill.over{background:var(--green)}

/* High-score flag on progress bar */
.progress-flag-wrap{position:relative;height:20px;margin-top:4px}
.progress-flag{position:absolute;top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none}
.progress-flag-pole{width:1px;height:10px;background:var(--yellow-text);opacity:.7}
.progress-flag-tag{font-size:9px;font-weight:800;background:var(--yellow-muted);border:1px solid var(--yellow-border);color:var(--yellow-text);border-radius:3px;padding:1px 4px;white-space:nowrap;letter-spacing:.3px}

/* Drop hero */
.back-btn{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text-secondary);background:none;border:none;cursor:pointer;padding:4px 0;transition:color .15s;min-height:44px}
.back-btn:hover{color:var(--text-primary)}
.drop-hero{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-lg);overflow:hidden}
.drop-hero-top{padding:20px 18px 16px;border-bottom:1px solid var(--border-color);background:var(--bg-tertiary)}
.drop-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary);margin-bottom:6px}
.drop-amount{font-size:48px;font-weight:800;line-height:1;color:var(--text-primary);font-variant-numeric:tabular-nums;letter-spacing:-1px}
.drop-sub{font-size:12px;color:var(--text-secondary);margin-top:6px;font-variant-numeric:tabular-nums}
.pull-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-secondary);margin-bottom:10px}
.pull-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:10px 14px;min-height:52px}
.pull-row-left{display:flex;align-items:center;gap:10px}
.pull-count-bubble{width:32px;height:32px;background:var(--green-muted);border:1px solid var(--green-border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--green-text)}
.pull-denom{font-size:22px;font-weight:800;color:var(--text-primary)}
.pull-value{font-size:18px;font-weight:800;color:var(--green-text);font-variant-numeric:tabular-nums}
.empty-state{text-align:center;padding:32px 16px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-sm)}
.empty-icon{width:44px;height:44px;border-radius:50%;background:var(--green-muted);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:var(--green-text)}
.warn-banner{display:flex;gap:12px;align-items:flex-start;background:var(--yellow-muted);border:1px solid var(--yellow-border);border-radius:var(--radius-sm);padding:14px 16px;margin-top:10px}
.warn-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;margin-top:1px;background:rgba(210,153,34,.2);border:1px solid var(--yellow-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--yellow-text)}
.warn-title{font-size:14px;font-weight:700;color:var(--yellow-text)}
.warn-body{font-size:12px;color:var(--yellow-text);opacity:.7;margin-top:3px}

/* Drawer */
.drawer-card{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-lg);overflow:hidden}
.drawer-header{background:var(--bg-tertiary);border-bottom:1px solid var(--border-color);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.drawer-total{font-size:32px;font-weight:800;color:var(--text-primary);font-variant-numeric:tabular-nums;line-height:1}
.breakdown-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-secondary);background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:8px 14px;min-height:44px;cursor:pointer;transition:all .15s}
.breakdown-btn:hover{background:var(--bg-overlay);color:var(--text-primary)}
.breakdown-btn:active{transform:scale(.95)}
.breakdown-body{padding:18px 20px}
.breakdown-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-secondary);border-bottom:1px solid var(--border-color);padding-bottom:10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:baseline}
.breakdown-subtotal{font-weight:700;color:var(--green-text);font-size:13px;font-variant-numeric:tabular-nums}
.breakdown-denom-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-subtle);min-height:48px}
.breakdown-denom-row:last-child{border-bottom:none}
.breakdown-left{display:flex;align-items:center;gap:12px}
.breakdown-chip-bill{height:28px;min-width:48px;padding:0 10px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:12px;font-weight:700;color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
.breakdown-chip-coin{width:32px;height:32px;border-radius:50%;background:var(--bg-tertiary);border:1px solid var(--border-color);font-size:10px;font-weight:700;color:var(--text-secondary);display:flex;align-items:center;justify-content:center}
.breakdown-count{font-size:13px;color:var(--text-muted)}
.breakdown-val{font-size:16px;font-weight:800;color:var(--green-text);font-variant-numeric:tabular-nums}
.breakdown-empty{font-size:13px;font-style:italic;color:var(--text-muted);text-align:center;padding:16px 0}

/* History panel */
.history-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
html[data-theme="light"] .history-backdrop{background:rgba(0,0,0,.3)}
.history-sheet{background:var(--bg-secondary);width:100%;max-width:480px;margin:0 auto;border-radius:18px 18px 0 0;max-height:82vh;display:flex;flex-direction:column;border:1px solid var(--border-color);border-bottom:none;box-shadow:var(--shadow-lg)}
.history-handle{display:flex;justify-content:center;padding:12px 0 4px}
.history-handle-bar{width:36px;height:4px;background:var(--bg-overlay);border-radius:99px}
.history-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 14px;border-bottom:1px solid var(--border-color)}
.history-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary)}
.history-clear{font-size:14px;font-weight:700;color:var(--danger);cursor:pointer;border:none;background:none;transition:opacity .15s;min-height:44px;padding:0 4px}
.history-clear:hover{opacity:.8}
.history-body{overflow-y:auto;flex:1}
.history-entry{padding:16px 20px;border-bottom:1px solid var(--border-subtle)}
.history-entry.is-record{background:linear-gradient(90deg,rgba(210,153,34,.06) 0%,transparent 100%);border-left:3px solid var(--yellow-text)}
.history-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.history-time{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted)}
.history-target{font-size:11px;font-weight:700;color:var(--text-muted);font-variant-numeric:tabular-nums}
.record-badge{font-size:9px;font-weight:800;background:var(--yellow-muted);border:1px solid var(--yellow-border);color:var(--yellow-text);border-radius:3px;padding:2px 6px;letter-spacing:.3px;text-transform:uppercase}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat-pill{border-radius:var(--radius-sm);padding:9px 10px;text-align:center;border:1px solid var(--border-color)}
.stat-pill.neutral{background:var(--bg-tertiary)}
.stat-pill.green{background:var(--green-muted);border-color:var(--green-border)}
.stat-pill.dark{background:var(--bg-primary)}
.stat-pill-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:3px}
.stat-pill-value{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text-primary)}
.stat-pill.green .stat-pill-value{color:var(--green-text)}
.history-chips{display:flex;flex-wrap:wrap;gap:5px}
.history-chip{font-size:11px;font-weight:700;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:3px 9px;color:var(--text-secondary)}
.history-empty{text-align:center;padding:70px 20px;color:var(--text-secondary)}
.history-empty-icon{width:52px;height:52px;border-radius:var(--radius-md);background:var(--bg-tertiary);border:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--text-muted)}

/* Layout */
.main-content{max-width:480px;margin:0 auto;padding:16px 16px 160px}
.section-body{padding:10px;display:flex;flex-direction:column;gap:5px}
.hold-hint{text-align:center;font-size:12px;color:var(--text-muted);padding-bottom:4px;letter-spacing:.3px}

/* Transitions */
.gh-card,.drop-hero,.drawer-card,.denom-row,.step-btn,.roll-btn,.breakdown-btn{transition-property:background,border-color,box-shadow,color;transition-duration:.2s}

/* Bump animation */
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
.total-bump{animation:bump .18s ease-out}

/* Confetti canvas */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999}

/* New record overlay */
.new-record-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.new-record-card{background:var(--bg-secondary);border:1px solid var(--yellow-border);border-radius:20px;padding:32px 28px;text-align:center;max-width:300px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(210,153,34,.15);animation:slideUp .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.record-trophy{font-size:52px;margin-bottom:12px}
.record-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--yellow-text);margin-bottom:8px}
.record-amount{font-size:44px;font-weight:900;color:var(--text-primary);font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1}
.record-sub{font-size:13px;color:var(--text-secondary);margin-top:6px}
.record-dismiss{margin-top:24px;background:var(--yellow-muted);border:1px solid var(--yellow-border);color:var(--yellow-text);font-size:14px;font-weight:700;padding:12px 28px;border-radius:var(--radius-md);cursor:pointer;transition:all .15s;width:100%}
.record-dismiss:hover{background:rgba(210,153,34,.25)}

/* Settings dialog */
.settings-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.settings-sheet{background:var(--bg-secondary);width:100%;max-width:480px;margin:0 auto;border-radius:18px 18px 0 0;border:1px solid var(--border-color);border-bottom:none;box-shadow:var(--shadow-lg)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-subtle);min-height:60px}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:15px;font-weight:600;color:var(--text-primary)}
.settings-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.toggle-track{width:48px;height:26px;border-radius:99px;cursor:pointer;transition:background .2s;border:none;padding:3px;display:flex;align-items:center;flex-shrink:0}
.toggle-track.on{background:var(--green);justify-content:flex-end}
.toggle-track.off{background:var(--bg-overlay);justify-content:flex-start}
.toggle-thumb{width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3);transition:all .2s}
.settings-action{font-size:14px;font-weight:600;color:var(--text-link);background:none;border:none;cursor:pointer;min-height:44px;padding:0 4px}
.settings-action:hover{opacity:.8}

/* Tutorial overlay */
.tutorial-backdrop{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);backdrop-filter:blur(4px)}
.tutorial-card{position:absolute;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:20px;max-width:320px;box-shadow:var(--shadow-lg);animation:slideUp .3s cubic-bezier(.34,1.2,.64,1)}
.tutorial-step-num{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--brand);margin-bottom:6px}
.tutorial-title{font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:6px}
.tutorial-body{font-size:13px;color:var(--text-secondary);line-height:1.6}
.tutorial-nav{display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:8px}
.tut-btn{height:36px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;padding:0 16px;transition:all .15s;border:1px solid var(--border-color)}
.tut-btn.primary{background:var(--brand);color:#fff;border-color:transparent}
.tut-btn.primary:hover{background:var(--brand-hover)}
.tut-btn.secondary{background:var(--bg-tertiary);color:var(--text-secondary)}
.tut-btn.secondary:hover{background:var(--bg-overlay)}
.tut-skip{font-size:12px;color:var(--text-muted);cursor:pointer;background:none;border:none;padding:4px;min-height:36px}
.tut-skip:hover{color:var(--text-secondary)}
.tut-dots{display:flex;gap:5px;align-items:center}
.tut-dot{width:6px;height:6px;border-radius:50%;background:var(--bg-overlay);transition:all .2s}
.tut-dot.active{background:var(--brand);width:18px;border-radius:3px}
.tutorial-highlight{position:absolute;border:2px solid var(--brand);border-radius:var(--radius-md);box-shadow:0 0 0 4px rgba(61,107,158,.25);pointer-events:none;transition:all .3s;animation:pulse-hl 2s infinite}
@keyframes pulse-hl{0%,100%{box-shadow:0 0 0 4px rgba(61,107,158,.25)}50%{box-shadow:0 0 0 8px rgba(61,107,158,.1)}}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef,memo}=React;

/* Icons */
const Icon=({d,size=16,...p})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p} dangerouslySetInnerHTML={{__html:d}}/>;
const Plus=p=><Icon d='<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>' {...p}/>;
const Minus=p=><Icon d='<line x1="5" y1="12" x2="19" y2="12"/>' {...p}/>;
const ArrowRight=p=><Icon d='<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>' {...p}/>;
const ArrowLeft=p=><Icon d='<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>' {...p}/>;
const Refresh=p=><Icon d='<path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>' {...p}/>;
const Check=p=><Icon d='<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>' {...p}/>;
const CoinIco=p=><Icon d='<circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/>' {...p}/>;
const ChevDown=p=><Icon d='<path d="m6 9 6 6 6-6"/>' {...p}/>;
const ChevUp=p=><Icon d='<path d="m18 15-6-6-6 6"/>' {...p}/>;
const ClockIco=p=><Icon d='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' {...p}/>;
const HistoryIco=p=><Icon d='<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>' {...p}/>;
const CloseX=p=><Icon d='<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>' {...p}/>;
const SunIco=p=><Icon d='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>' {...p}/>;
const MoonIco=p=><Icon d='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>' {...p}/>;
const SettingsIco=p=><Icon d='<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>' {...p}/>;
const TrophyIco=p=><Icon d='<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>' {...p}/>;

/* Constants */
const BILL_DENOMS=[100,50,20,10,5,1];
const COIN_DENOMS=[
  {id:'1.00',label:'100¢',val:1.00,roll:null},
  {id:'0.50',label:'50¢', val:0.50,roll:null},
  {id:'0.25',label:'25¢', val:0.25,roll:40},
  {id:'0.10',label:'10¢', val:0.10,roll:50},
  {id:'0.05',label:'5¢',  val:0.05,roll:40},
  {id:'0.01',label:'1¢',  val:0.01,roll:50},
];
const EMPTY_CASH={'100':'','50':'','20':'','10':'','5':'','1':'','1.00':'','0.50':'','0.25':'','0.10':'','0.05':'','0.01':''};
const LS_HISTORY='ac_history_v2';
const LS_SETTINGS='ac_settings_v1';
const LS_TUTORIAL='ac_tutorial_v1';
const LS_RECORD='ac_record_v1';

const haptic=p=>{try{navigator.vibrate?.(p);}catch{}};
const toCents=n=>Math.round(n*100);
const fromCents=c=>c/100;
const ls=(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

function getEntryValue(cash,id,denom,mode){
  const r=Number(cash[id])||0;
  return mode==='value'?r:fromCents(Math.floor(r)*toCents(denom));
}
function getEntryCount(cash,id,denom,mode){
  const r=Number(cash[id])||0;
  return mode==='count'?Math.floor(r):Math.floor(toCents(r)/toCents(denom));
}
function computeDrop(cash,billsMode,dropAmt){
  let rem=toCents(dropAmt);const out=[];
  for(const d of BILL_DENOMS){
    const avail=getEntryCount(cash,d.toString(),d,billsMode),dc=toCents(d);let take=0;
    for(let i=0;i<avail;i++){if(rem>=dc){take++;rem-=dc;}}
    if(take>0)out.push({label:`$${d}`,count:take,value:take*d,denom:d});
  }
  return out;
}
function loadHistory(){return ls(LS_HISTORY,[]);}
function saveHistory(e){
  const h=loadHistory();
  // Deduplicate: don't add if same session (same ts rounded to minute)
  h.unshift(e);
  lsSet(LS_HISTORY,h.slice(0,50));
}
function formatTime(ts){return new Date(ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function rowSubtotal(value,denom,mode){
  const r=Number(value)||0;if(!r)return null;
  return mode==='count'?`= $${(Math.floor(r)*denom).toFixed(2)}`:`= ${Math.floor(toCents(r)/toCents(denom))}×`;
}
function convertCash(cash,from,to,denoms){
  const next={...cash};
  for(const{id,val}of denoms){
    const r=Number(cash[id])||0;if(!r)continue;
    if(from==='count'&&to==='value'){const d=parseFloat((Math.floor(r)*val).toFixed(2));next[id]=d?d.toString():'';}
    else if(from==='value'&&to==='count'){const c=Math.floor(toCents(r)/toCents(val));next[id]=c?c.toString():'';}
  }
  return next;
}

/* ── Confetti ── */
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  if(!canvas)return;
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const pieces=[];
  const colors=['#3fb950','#58a6ff','#e3b341','#f78166','#bc8cff','#ffa657'];
  for(let i=0;i<120;i++){
    pieces.push({x:Math.random()*canvas.width,y:-10-Math.random()*200,
      vx:(Math.random()-0.5)*6,vy:3+Math.random()*4,
      color:colors[Math.floor(Math.random()*colors.length)],
      w:6+Math.random()*6,h:10+Math.random()*6,rot:Math.random()*360,rv:(Math.random()-0.5)*8,alpha:1});
  }
  let raf;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=0;
    for(const p of pieces){
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=0.08;p.alpha-=0.008;
      if(p.y<canvas.height&&p.alpha>0){alive++;
        ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}
    }
    if(alive>0)raf=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
  setTimeout(()=>{cancelAnimationFrame(raf);ctx.clearRect(0,0,canvas.width,canvas.height);},5000);
}

/* ── Toggle ── */
const Toggle=({on,onChange})=>(
  <button className={`toggle-track ${on?'on':'off'}`} onClick={onChange}>
    <div className="toggle-thumb"/>
  </button>
);

/* ── Mode Toggle ── */
const ModeToggle=({mode,onChange})=>(
  <div className="mode-toggle">
    <button className={`mode-btn${mode==='count'?' active':''}`} onClick={()=>{haptic([5]);onChange('count');}}>Count</button>
    <button className={`mode-btn${mode==='value'?' active':''}`} onClick={()=>{haptic([5]);onChange('value');}}>Value</button>
  </div>
);

/* ── BillRow ── */
const BillRow=memo(({id,label,denom,inputMode,value,onManualInput,onUpdate,onClear})=>{
  const has=Number(value)>0,sub=rowSubtotal(value,denom,inputMode),ht=useRef(null);
  const sh=()=>{ht.current=setTimeout(()=>{if(has){haptic([10,40,20]);onClear(id);}},600);};
  const ch=()=>clearTimeout(ht.current);
  return(
    <div className={`denom-row${has?' has-value':''}`}>
      <span className={`denom-label-bill${has?' active':''}`}>{label}</span>
      <div className="denom-input-wrap">
        {inputMode==='value'&&<span className="denom-prefix">$</span>}
        <input type="number" min="0" step="any" inputMode="decimal"
          className={`denom-input${inputMode==='value'?' has-prefix':''}`}
          value={value} onChange={e=>onManualInput(id,e.target.value)} placeholder="0"/>
        {sub&&<span className="row-sub">{sub}</span>}
      </div>
      <div className="stepper">
        <button onPointerDown={()=>{haptic([5]);sh();}} onPointerUp={ch} onPointerLeave={ch}
          onClick={()=>onUpdate(id,-1,denom)} className="step-btn" title="Hold to clear"><Minus size={18}/></button>
        <button onPointerDown={()=>haptic([8])} onClick={()=>onUpdate(id,1,denom)}
          className={`step-btn plus${has?' active':''}`}><Plus size={18}/></button>
      </div>
    </div>
  );
});

/* ── CoinRow ── */
const CoinRow=memo(({id,label,denom,inputMode,value,onManualInput,onUpdate,rollCount,onClear})=>{
  const has=Number(value)>0,sub=rowSubtotal(value,denom,inputMode),ht=useRef(null);
  const sh=()=>{ht.current=setTimeout(()=>{if(has){haptic([10,40,20]);onClear(id);}},600);};
  const ch=()=>clearTimeout(ht.current);
  return(
    <div className={`denom-row${has?' has-value':''}`}>
      <div className={`denom-label-coin${has?' active':''}`}>{label}</div>
      <div className="denom-input-wrap">
        {inputMode==='value'&&<span className="denom-prefix">$</span>}
        <input type="number" min="0" step="any" inputMode="decimal"
          className={`denom-input${inputMode==='value'?' has-prefix':''}`}
          value={value} onChange={e=>onManualInput(id,e.target.value)} placeholder="0"/>
        {sub&&<span className="row-sub">{sub}</span>}
      </div>
      <div className="stepper">
        <button onPointerDown={()=>{haptic([5]);sh();}} onPointerUp={ch} onPointerLeave={ch}
          onClick={()=>onUpdate(id,-1,denom)} className="step-btn" title="Hold to clear"><Minus size={16}/></button>
        <button onPointerDown={()=>haptic([7])} onClick={()=>onUpdate(id,1,denom)}
          className={`step-btn plus${has?' active':''}`}><Plus size={16}/></button>
        {rollCount&&(
          <button onPointerDown={()=>haptic([6,30,10])} onClick={()=>onUpdate(id,rollCount,denom)} className="roll-btn">
            <div className="roll-btn-icons"><Plus size={11}/><CoinIco size={14}/></div>
            <span className="roll-btn-label">{inputMode==='count'?`+${rollCount}`:`+$${(rollCount*denom).toFixed(0)}`}</span>
          </button>
        )}
      </div>
    </div>
  );
});

/* ── Animated total ── */
function AnimatedTotal({value,className}){
  const[display,setDisplay]=useState(value),[bump,setBump]=useState(false),prev=useRef(value);
  useEffect(()=>{
    if(value!==prev.current){setBump(true);setTimeout(()=>setBump(false),200);prev.current=value;}
    setDisplay(value);
  },[value]);
  return <div className={`${className}${bump?' total-bump':''}`}>{display}</div>;
}

/* ── Progress bar with record flag ── */
function ProgressBar({pct,over,target,recordDrop,gamification}){
  // If zoomed out (past 200), pct is already capped at 100 by parent
  // record flag position: (recordDrop / target) * 100, capped 0-100
  const flagPct=target>0?Math.min(98,Math.max(2,(recordDrop/target)*100)):null;
  return(
    <div>
      <div className="progress-track" style={{height:'8px'}}>
        <div className={`progress-fill${over?' over':''}`} style={{width:`${pct}%`}}/>
      </div>
      {gamification&&flagPct!=null&&recordDrop>0&&(
        <div className="progress-flag-wrap">
          <div className="progress-flag" style={{left:`${flagPct}%`}}>
            <div className="progress-flag-pole"/>
            <div className="progress-flag-tag">🏆 ${recordDrop.toFixed(0)}</div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── History Panel ── */
const HistoryPanel=({onClose})=>{
  const[history,setHistory]=useState(loadHistory);
  const sheetRef=useRef(null),startY=useRef(null);
  const record=ls(LS_RECORD,0);
  const onTS=e=>{startY.current=e.touches[0].clientY;};
  const onTM=e=>{const dy=e.touches[0].clientY-startY.current;if(dy>0&&sheetRef.current)sheetRef.current.style.transform=`translateY(${dy}px)`;};
  const onTE=e=>{const dy=e.changedTouches[0].clientY-startY.current;if(sheetRef.current)sheetRef.current.style.transform='';if(dy>80){haptic([6]);onClose();}startY.current=null;};
  const clearHistory=()=>{haptic([8,60,15]);if(window.confirm('Clear all drop history?')){localStorage.removeItem(LS_HISTORY);setHistory([]);}};
  return(
    <div className="history-backdrop" onClick={e=>{if(e.target===e.currentTarget){haptic([6]);onClose();}}}>
      <div className="history-sheet" ref={sheetRef} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE} style={{transition:'transform .05s'}}>
        <div className="history-handle"><div className="history-handle-bar"/></div>
        <div className="history-hd">
          <span className="history-title">Drop History</span>
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            {history.length>0&&<button className="history-clear" onClick={clearHistory}>Clear All</button>}
            <button className="gh-btn-icon" onClick={()=>{haptic([6]);onClose();}}><CloseX size={18}/></button>
          </div>
        </div>
        <div className="history-body">
          {history.length===0?(
            <div className="history-empty">
              <div className="history-empty-icon"><ClockIco size={22}/></div>
              <div style={{fontWeight:700,fontSize:'15px',marginBottom:'6px'}}>No drops yet</div>
              <div style={{fontSize:'13px',opacity:.6}}>Completed counts will appear here</div>
            </div>
          ):history.map((e,i)=>(
            <div key={i} className={`history-entry${e.dropped===record&&record>0?' is-record':''}`}>
              <div className="history-meta">
                <span className="history-time">{formatTime(e.ts)}</span>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  {e.dropped===record&&record>0&&<span className="record-badge">🏆 Record</span>}
                  <span className="history-target">target ${e.target?.toFixed(2)}</span>
                </div>
              </div>
              <div className="stat-grid">
                <div className="stat-pill neutral"><div className="stat-pill-label">Counted</div><div className="stat-pill-value">${e.totalCash.toFixed(2)}</div></div>
                <div className="stat-pill green"><div className="stat-pill-label">Dropped</div><div className="stat-pill-value">${e.dropped.toFixed(2)}</div></div>
                <div className="stat-pill dark"><div className="stat-pill-label">Remains</div><div className="stat-pill-value">${e.remaining.toFixed(2)}</div></div>
              </div>
              {e.dropDetails?.length>0&&(
                <div className="history-chips">
                  {e.dropDetails.map(d=><span key={d.label} className="history-chip">{d.count}× {d.label}</span>)}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ── Settings Panel ── */
const SettingsPanel=({onClose,settings,onChange,onReplayTutorial})=>{
  const sheetRef=useRef(null),startY=useRef(null);
  const onTS=e=>{startY.current=e.touches[0].clientY;};
  const onTM=e=>{const dy=e.touches[0].clientY-startY.current;if(dy>0&&sheetRef.current)sheetRef.current.style.transform=`translateY(${dy}px)`;};
  const onTE=e=>{const dy=e.changedTouches[0].clientY-startY.current;if(sheetRef.current)sheetRef.current.style.transform='';if(dy>80){haptic([6]);onClose();}startY.current=null;};
  return(
    <div className="settings-backdrop" onClick={e=>{if(e.target===e.currentTarget){haptic([6]);onClose();}}}>
      <div className="settings-sheet" ref={sheetRef} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE} style={{transition:'transform .05s'}}>
        <div className="history-handle"><div className="history-handle-bar"/></div>
        <div className="history-hd">
          <span className="history-title">Settings</span>
          <button className="gh-btn-icon" onClick={()=>{haptic([6]);onClose();}}><CloseX size={18}/></button>
        </div>
        <div style={{paddingBottom:'env(safe-area-inset-bottom,20px)'}}>
          <div className="settings-row">
            <div>
              <div className="settings-label">Gamification</div>
              <div className="settings-sub">High-score flag, record alerts & confetti</div>
            </div>
            <Toggle on={settings.gamification} onChange={()=>{haptic([5]);onChange('gamification',!settings.gamification);}}/>
          </div>
          <div className="settings-row">
            <div>
              <div className="settings-label">Tutorial</div>
              <div className="settings-sub">Replay the onboarding walkthrough</div>
            </div>
            <button className="settings-action" onClick={()=>{haptic([6]);onReplayTutorial();onClose();}}>Replay</button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── Tutorial ── */
const TUTORIAL_STEPS=[
  {title:'Welcome to Apple-Counter!',body:'Count your drawer quickly and calculate exactly what to drop. Let\'s take a quick tour — or skip anytime.',target:null},
  {title:'Enter Bill Counts',body:'Tap + to add bills, or type directly. Switch between Count and Value mode using the toggle in the header.',target:'bills-card'},
  {title:'Enter Coins Too',body:'Same deal for coins. Hit the blue button to add a full roll at once.',target:'coins-card'},
  {title:'Watch the Progress Bar',body:'The bar fills as you count. Once you pass your target amount it turns green. A flag shows your record drop.',target:'progress-bar'},
  {title:'Calculate Your Drop',body:'Tap Calculate to see exactly which bills to pull out. Your drop is auto-saved to history.',target:'calc-btn'},
  {title:'You\'re all set! 🎉',body:'Check drop history with the clock icon. Settings let you toggle gamification. Have a great shift!',target:null},
];

function Tutorial({onDone}){
  const[step,setStep]=useState(0);
  const s=TUTORIAL_STEPS[step];
  const next=()=>{ haptic([5]); if(step<TUTORIAL_STEPS.length-1)setStep(s=>s+1); else onDone(); };
  const skip=()=>{ haptic([4]); onDone(); };
  // Highlight target element
  const[hl,setHl]=useState(null);
  useEffect(()=>{
    if(!s.target){setHl(null);return;}
    const el=document.getElementById(s.target);
    if(!el){setHl(null);return;}
    const r=el.getBoundingClientRect();
    setHl({top:r.top+window.scrollY-6,left:r.left-6,width:r.width+12,height:r.height+12});
  },[step]);
  // Card position: center, or near bottom if highlight is high up
  const cardStyle={
    bottom:'100px',left:'50%',transform:'translateX(-50%)',
    width:'min(320px, calc(100vw - 32px))',
  };
  return(
    <div className="tutorial-backdrop">
      {hl&&<div className="tutorial-highlight" style={{top:hl.top,left:hl.left,width:hl.width,height:hl.height,position:'absolute'}}/>}
      <div className="tutorial-card" style={{...cardStyle,position:'fixed'}}>
        <div className="tutorial-step-num">Step {step+1} of {TUTORIAL_STEPS.length}</div>
        <div className="tutorial-title">{s.title}</div>
        <div className="tutorial-body">{s.body}</div>
        <div className="tutorial-nav">
          <button className="tut-skip" onClick={skip}>Skip tour</button>
          <div className="tut-dots">
            {TUTORIAL_STEPS.map((_,i)=><div key={i} className={`tut-dot${i===step?' active':''}`}/>)}
          </div>
          <button className="tut-btn primary" onClick={next}>
            {step===TUTORIAL_STEPS.length-1?'Done':'Next'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── New Record Overlay ── */
function NewRecord({amount,onDismiss}){
  return(
    <div className="new-record-overlay" onClick={onDismiss}>
      <div className="new-record-card" onClick={e=>e.stopPropagation()}>
        <div className="record-trophy">🏆</div>
        <div className="record-title">New Drop Record!</div>
        <div className="record-amount">${amount.toFixed(2)}</div>
        <div className="record-sub">That's your biggest drop yet. Nice work!</div>
        <button className="record-dismiss" onClick={onDismiss}>Awesome!</button>
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const[theme,setTheme]=useState(()=>ls('ac_theme','dark'));
  const[targetInput,setTargetInput]=useState('200');
  const[billsMode,setBillsMode]=useState('count');
  const[coinsMode,setCoinsMode]=useState('count');
  const[cash,setCash]=useState(EMPTY_CASH);
  const[step,setStep]=useState(1);
  const[drawerOpen,setDrawerOpen]=useState(true);
  const[showHistory,setShowHistory]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[savedToHistory,setSavedToHistory]=useState(false);
  const[settings,setSettings]=useState(()=>ls(LS_SETTINGS,{gamification:true}));
  const[showRecord,setShowRecord]=useState(null);
  const[showTutorial,setShowTutorial]=useState(()=>!ls(LS_TUTORIAL,false));

  const TARGET=Math.max(0,Number(targetInput)||0);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);lsSet('ac_theme',theme);},[theme]);
  const toggleTheme=()=>{haptic([5]);setTheme(t=>t==='dark'?'light':'dark');};

  const changeSetting=(k,v)=>{
    setSettings(s=>{const n={...s,[k]:v};lsSet(LS_SETTINGS,n);return n;});
  };

  const handleBillsModeChange=useCallback(m=>{
    setCash(p=>convertCash(p,billsMode,m,BILL_DENOMS.map(d=>({id:d.toString(),val:d}))));
    setBillsMode(m);
  },[billsMode]);

  const handleCoinsModeChange=useCallback(m=>{
    setCash(p=>convertCash(p,coinsMode,m,COIN_DENOMS.map(c=>({id:c.id,val:c.val}))));
    setCoinsMode(m);
  },[coinsMode]);

  const totalBillsCents=BILL_DENOMS.reduce((s,d)=>s+toCents(getEntryValue(cash,d.toString(),d,billsMode)),0);
  const totalCoinsCents=COIN_DENOMS.reduce((s,c)=>s+toCents(getEntryValue(cash,c.id,c.val,coinsMode)),0);
  const totalCents=totalBillsCents+totalCoinsCents;
  const totalCash=fromCents(totalCents);
  const overageCents=totalCents-toCents(TARGET);
  const dropAmount=fromCents(Math.max(0,Math.floor(overageCents/100)*100));
  const dropDetails=computeDrop(cash,billsMode,dropAmount);
  const actualDropTotal=dropDetails.reduce((s,i)=>s+i.value,0);
  const remainingInDrawer=fromCents(totalCents-toCents(actualDropTotal));
  const undroppableCents=overageCents>0?toCents(dropAmount)-toCents(actualDropTotal):0;

  const recordDrop=ls(LS_RECORD,0);

  // Progress: smooth fill, zooms out past target
  const rawPct=TARGET>0?Math.min(100,(totalCash/TARGET)*100):0;
  const over=totalCash>=TARGET;

  useEffect(()=>{
    if(step===2&&!savedToHistory){
      const entry={ts:Date.now(),totalCash,dropped:actualDropTotal,remaining:remainingInDrawer,target:TARGET,dropDetails};
      saveHistory(entry);
      setSavedToHistory(true);
      // Check record
      if(settings.gamification&&actualDropTotal>0&&actualDropTotal>recordDrop){
        lsSet(LS_RECORD,actualDropTotal);
        setTimeout(()=>{launchConfetti();setShowRecord(actualDropTotal);},400);
      }
    }
  },[step]);

  const handleManualInput=useCallback((id,val)=>{
    if(val===''||/^\d*\.?\d*$/.test(val))setCash(p=>({...p,[id]:val}));
  },[]);
  const updateVal=useCallback((id,delta,denom,mode)=>{
    setCash(p=>{
      const cur=Number(p[id])||0,step=mode==='count'?1:denom;
      const next=Math.max(0,cur+delta*step);
      const v=mode==='value'?parseFloat(next.toFixed(2)):Math.round(next);
      return{...p,[id]:v===0?'':v.toString()};
    });
  },[]);
  const clearRow=useCallback(id=>setCash(p=>({...p,[id]:''})),[]);
  const goStep2=()=>{haptic([10,30,15]);setStep(2);setSavedToHistory(false);setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),10);};
  const goStep1=()=>{haptic([6]);setStep(1);setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),10);};
  const resetAll=()=>{haptic([8,60,20]);if(window.confirm('Clear all counts and start over?')){setCash(EMPTY_CASH);setStep(1);setSavedToHistory(false);}};

  return(
    <div style={{minHeight:'100vh'}}>
      <header className="gh-header">
        <div className="gh-header-brand">
          <div className="gh-logo">AC</div>
          <div>
            <div className="gh-header-title">Apple-Counter</div>
            <div className="gh-header-sub">.site</div>
          </div>
        </div>
        <div className="gh-header-actions">
          <button className="theme-toggle" onClick={toggleTheme} aria-label="Toggle theme">
            {theme==='dark'?<SunIco size={18}/>:<MoonIco size={18}/>}
          </button>
          <button className="gh-btn-icon" onClick={()=>{haptic([6]);setShowHistory(true);}} aria-label="History"><HistoryIco size={18}/></button>
          <button className="gh-btn-icon" onClick={()=>{haptic([6]);setShowSettings(true);}} aria-label="Settings"><SettingsIco size={18}/></button>
          <button className="gh-btn-icon" onClick={resetAll} aria-label="Reset"><Refresh size={18}/></button>
        </div>
      </header>

      <main className="main-content">
        {step===1&&(
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div className="gh-card" id="bills-card">
              <div className="gh-card-header">
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span className="gh-section-label">Bills</span>
                  <span className="gh-badge">${(totalBillsCents/100).toFixed(2)}</span>
                </div>
                <ModeToggle mode={billsMode} onChange={handleBillsModeChange}/>
              </div>
              <div className="section-body">
                {BILL_DENOMS.map(d=>(
                  <BillRow key={d} id={d.toString()} label={`$${d}`} denom={d}
                    inputMode={billsMode} value={cash[d.toString()]}
                    onManualInput={handleManualInput}
                    onUpdate={(id,dlt,dnm)=>updateVal(id,dlt,dnm,billsMode)}
                    onClear={clearRow}/>
                ))}
              </div>
            </div>
            <div className="gh-card" id="coins-card">
              <div className="gh-card-header">
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span className="gh-section-label">Coins</span>
                  <span className="gh-badge">${(totalCoinsCents/100).toFixed(2)}</span>
                </div>
                <ModeToggle mode={coinsMode} onChange={handleCoinsModeChange}/>
              </div>
              <div className="section-body">
                {COIN_DENOMS.map(c=>(
                  <CoinRow key={c.id} id={c.id} label={c.label} denom={c.val}
                    rollCount={c.roll} inputMode={coinsMode}
                    value={cash[c.id]} onManualInput={handleManualInput}
                    onUpdate={(id,dlt,dnm)=>updateVal(id,dlt,dnm,coinsMode)}
                    onClear={clearRow}/>
                ))}
              </div>
            </div>
            <div className="hold-hint">Hold − to clear a row</div>
          </div>
        )}

        {step===2&&(
          <div style={{display:'flex',flexDirection:'column',gap:'12px',paddingBottom:'16px'}}>
            <button className="back-btn" onClick={goStep1}><ArrowLeft size={18}/> Back to edit</button>
            <div className="drop-hero">
              <div className="drop-hero-top">
                <div className="drop-eyebrow">Drop Safe</div>
                <div className="drop-amount">${actualDropTotal.toFixed(2)}</div>
                <div className="drop-sub">from ${totalCash.toFixed(2)} counted · target ${TARGET.toFixed(2)}</div>
              </div>
              <div style={{padding:'0 14px 14px'}}>
                <div className="pull-label" style={{marginTop:'14px'}}>Pull these bills</div>
                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                  {dropDetails.length>0?dropDetails.map(item=>(
                    <div key={item.label} className="pull-row">
                      <div className="pull-row-left">
                        <div className="pull-count-bubble">{item.count}</div>
                        <span style={{fontSize:'12px',color:'var(--text-muted)'}}>×</span>
                        <span className="pull-denom">{item.label}</span>
                      </div>
                      <span className="pull-value">${item.value.toFixed(2)}</span>
                    </div>
                  )):(
                    <div className="empty-state">
                      <div className="empty-icon"><Check size={22}/></div>
                      <div style={{fontWeight:700,fontSize:'16px',color:'var(--text-primary)',marginBottom:'6px'}}>No drop required</div>
                      <div style={{fontSize:'13px',color:'var(--text-secondary)'}}>Drawer is at or below target</div>
                    </div>
                  )}
                </div>
                {undroppableCents>0&&(
                  <div className="warn-banner">
                    <div className="warn-dot">!</div>
                    <div>
                      <div className="warn-title">${fromCents(undroppableCents).toFixed(2)} couldn't be dropped</div>
                      <div className="warn-body">No matching bills — this overage stays in the drawer.</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="drawer-card">
              <div className="drawer-header">
                <div>
                  <div style={{fontSize:'10px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.7px',color:'var(--text-secondary)',marginBottom:'4px'}}>Leave in Drawer</div>
                  <div className="drawer-total">${remainingInDrawer.toFixed(2)}</div>
                </div>
                <button className="breakdown-btn" onClick={()=>{haptic([5]);setDrawerOpen(v=>!v);}}>
                  Breakdown {drawerOpen?<ChevUp size={16}/>:<ChevDown size={16}/>}
                </button>
              </div>
              {drawerOpen&&(
                <div className="breakdown-body">
                  <div style={{marginBottom:'16px'}}>
                    <div className="breakdown-section-title">
                      <span>Bills</span>
                      <span className="breakdown-subtotal">${((totalBillsCents-toCents(actualDropTotal))/100).toFixed(2)}</span>
                    </div>
                    {BILL_DENOMS.map(d=>{
                      const sv=getEntryValue(cash,d.toString(),d,billsMode),drop=dropDetails.find(i=>i.denom===d),fv=sv-(drop?drop.value:0),fc=Math.round(fv/d);
                      if(fc<=0)return null;
                      return(
                        <div key={d} className="breakdown-denom-row">
                          <div className="breakdown-left"><div className="breakdown-chip-bill">${d}</div><span className="breakdown-count">× {fc}</span></div>
                          <span className="breakdown-val">${fv.toFixed(2)}</span>
                        </div>
                      );
                    })}
                    {(totalBillsCents-toCents(actualDropTotal))<=0&&<div className="breakdown-empty">No bills remaining</div>}
                  </div>
                  <div>
                    <div className="breakdown-section-title">
                      <span>Coins</span>
                      <span className="breakdown-subtotal">${(totalCoinsCents/100).toFixed(2)}</span>
                    </div>
                    {COIN_DENOMS.map(c=>{
                      const val=getEntryValue(cash,c.id,c.val,coinsMode),count=Math.round(fromCents(toCents(val))/c.val);
                      if(count<=0)return null;
                      return(
                        <div key={c.id} className="breakdown-denom-row">
                          <div className="breakdown-left"><div className="breakdown-chip-coin">{c.label}</div><span className="breakdown-count">× {count}</span></div>
                          <span className="breakdown-val">${val.toFixed(2)}</span>
                        </div>
                      );
                    })}
                    {totalCoinsCents<=0&&<div className="breakdown-empty">No coins remaining</div>}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </main>

      {step===1&&(
        <div className="sticky-footer">
          <div className="footer-row">
            <div style={{flex:1}}>
              <div className="footer-total-label">Total Counted</div>
              <AnimatedTotal value={`$${totalCash.toFixed(2)}`} className={`footer-total-value${over?' over':''}`}/>
            </div>
            <button id="calc-btn" className="gh-btn-primary" onPointerDown={()=>haptic([10,30,15])} onClick={goStep2}>
              Calculate <ArrowRight size={18}/>
            </button>
          </div>
          <div className="target-row" id="progress-bar">
            <div className="target-meta">
              <div className="target-label-group">
                Target $
                <input type="number" className="target-input" value={targetInput} onChange={e=>setTargetInput(e.target.value)}/>
              </div>
              {totalCash>0&&(
                <span className={`target-status${over?' over':' under'}`}>
                  {over?`+$${(totalCash-TARGET).toFixed(2)} over`:`-$${(TARGET-totalCash).toFixed(2)} short`}
                </span>
              )}
            </div>
            <ProgressBar pct={rawPct} over={over} target={TARGET} recordDrop={recordDrop} gamification={settings.gamification}/>
          </div>
        </div>
      )}

      {showHistory&&<HistoryPanel onClose={()=>setShowHistory(false)}/>}
      {showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)} settings={settings} onChange={changeSetting} onReplayTutorial={()=>{lsSet(LS_TUTORIAL,false);setShowTutorial(true);}}/>}
      {showRecord&&<NewRecord amount={showRecord} onDismiss={()=>setShowRecord(null)}/>}
      {showTutorial&&<Tutorial onDone={()=>{lsSet(LS_TUTORIAL,true);setShowTutorial(false);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- PWA Service Worker -->
<script>
if('serviceWorker' in navigator){
  const sw=`
self.addEventListener('install',e=>e.waitUntil(
  caches.open('ac-v1').then(c=>c.addAll(['/']))
));
self.addEventListener('fetch',e=>e.respondWith(
  caches.match(e.request).then(r=>r||fetch(e.request))
));`;
  const blob=new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
