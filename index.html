<html lang="en" data-theme="dark">
<head>

<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233d6b9e'/><path d='M50 20 C50 20 42 14 34 18 C26 22 24 32 28 40 C32 48 50 72 50 72 C50 72 68 48 72 40 C76 32 74 22 66 18 C58 14 50 20 50 20 Z' fill='white'/><path d='M50 20 C50 20 54 12 60 13' stroke='white' stroke-width='3' fill='none' stroke-linecap='round'/></svg>">
<title>Apple-Counter Drop</title>

</script>

</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="root">
  <div id="pre-sk" style="max-width:480px;margin:0 auto;padding:14px 14px 0;padding-top:calc(58px + env(safe-area-inset-top) + 14px);display:flex;flex-direction:column;gap:12px">
    <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden">
      <div style="background:#21262d;border-bottom:1px solid #30363d;padding:11px 14px;height:52px"></div>
      <div style="padding:8px;display:flex;flex-direction:column;gap:4px">
        <div class="sk-row-inline"></div>
        <div class="sk-row-inline"></div>
        <div class="sk-row-inline"></div>
        <div class="sk-row-inline"></div>
        <div class="sk-row-inline"></div>
        <div class="sk-row-inline"></div>
      </div>
    </div>
    <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden">
      <div style="background:#21262d;padding:11px 14px;height:52px"></div>
    </div>
  </div>
  <div id="pre-sk-footer" style="position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #30363d;padding:10px 16px calc(10px + env(safe-area-inset-bottom));z-index:20">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px">
      <div class="sk" style="height:52px;border-radius:8px;flex:1"></div>
      <div class="sk" style="height:52px;border-radius:8px;width:120px;flex-shrink:0"></div>
    </div>
    <div class="sk" style="height:26px;border-radius:99px;margin-bottom:10px"></div>
    <div class="sk" style="height:52px;border-radius:8px;background:#1a3a22"></div>
  </div>
</div>
<script>
(function(){
  try{
    const key='ac_theme';
    const stored=JSON.parse(localStorage.getItem(key));
    const theme=(stored==='dark'||stored==='light')
      ? stored
      : (window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
    document.documentElement.setAttribute('data-theme',theme);
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute('content',theme==='dark'?'#0d1117':'#ffffff');
  }catch{}
})();
</script>

<script>
(function(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./sw.js')
    .then(reg => { reg.update().catch(() => {}); })
    .catch(() => {});
})();
</script>
<style>.install-banner{position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--bd);padding:14px 16px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.35);transform:translateY(100%);transition:transform .38s cubic-bezier(.34,1.4,.64,1)}.install-banner.visible{transform:translateY(0)}html[data-theme="light"] .install-banner{box-shadow:0 -4px 20px rgba(31,35,40,.12)}.install-banner-icon{width:42px;height:42px;background:var(--brand);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:22px}.install-banner-text{flex:1;min-width:0}.install-banner-title{font-size:14px;font-weight:700;color:var(--t0);margin-bottom:2px}.install-banner-sub{font-size:12px;color:var(--t1)}.install-banner-actions{display:flex;gap:8px;flex-shrink:0}.install-btn-yes{height:36px;padding:0 16px;background:var(--brand);border:none;border-radius:var(--r-sm);color:#fff;font-size:13px;font-weight:700;cursor:pointer}.install-btn-yes:active{opacity:.85}.install-btn-no{height:36px;padding:0 12px;background:transparent;border:1px solid var(--bd);border-radius:var(--r-sm);color:var(--t1);font-size:13px;font-weight:600;cursor:pointer}.install-btn-no:active{background:var(--bg2)}</style>
<div id="install-banner" class="install-banner" role="banner" aria-label="Install app">
  <div class="install-banner-icon"><i class="fa-solid fa-apple-whole"></i></div>
  <div class="install-banner-text">
    <div class="install-banner-title">Add to Home Screen</div>
    <div class="install-banner-sub">Works offline · feels native</div>
  </div>
  <div class="install-banner-actions">
    <button class="install-btn-no" id="install-dismiss">Not now</button>
    <button class="install-btn-yes" id="install-accept">Install</button>
  </div>
</div>
<script>
(function(){
  const DISMISS_KEY = 'ac_install_dismissed';
  let deferredPrompt = null;
  const banner = document.getElementById('install-banner');
  const btnYes = document.getElementById('install-accept');
  const btnNo  = document.getElementById('install-dismiss');
  function hideBanner(){
    banner.classList.remove('visible');
  }
  function showBanner(){
    const dismissed = localStorage.getItem(DISMISS_KEY);
    if(dismissed && Date.now() - Number(dismissed) < 7 * 24 * 60 * 60 * 1000) return;
    if(window.matchMedia('(display-mode: standalone)').matches) return;
    if(window.navigator.standalone) return; // iOS Safari PWA
    setTimeout(() => banner.classList.add('visible'), 1200);
  }
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    showBanner();
  });
  btnYes.addEventListener('click', async () => {
    if(!deferredPrompt) return;
    try{
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if(outcome === 'accepted') localStorage.removeItem(DISMISS_KEY);
    }catch{}
    deferredPrompt = null;
    hideBanner();
  });
  btnNo.addEventListener('click', () => {
    localStorage.setItem(DISMISS_KEY, String(Date.now()));
    hideBanner();
  });
  window.addEventListener('appinstalled', hideBanner);
})();
</script>
<script type="text/babel" src="./app.jsx"></script>
</body>
</html>
